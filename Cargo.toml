[workspace]
members = [
    "node",
    "runtime",
    "runtime/generate-bags",
    "pallets/*",
    "attestor",
    "prover",
    "primitives/attestor",
    "primitives/prover",
    "primitives/supported-chains",
    "primitives/randomness",
    "primitives/pallet-prover",
    "precompiles/proof-verifier",
    "precompiles/substrate-transfer",
    "host",
    "common/*",
    "attestor_zombienet",
    "query-cli",
]
resolver = "2"

[workspace.package]
authors = ["Gluwa Inc. Developer Support <support.dev@gluwa.com>"]
edition = "2021"
license = "Unlicense"
publish = false
repository = "https://github.com/gluwa/creditcoin3/"
version = "3.31.0"

[workspace.dependencies]
assert_matches = "1.5.0"

# Substrate Clientassert_matches = "1.5.0"

affix = "0.1"
anyhow = { version = "1.0", default-features = false }
async-trait = { version = "0.1.42" }
bip32 = { version = "0.5.1", default-features = false, features = ["bip39"] }
clap = { version = "4.5.3", features = ["derive"] }
derive_more = "0.99.17"
env_logger = "0.11"
environmental = { version = "1.1.4", default-features = false }
ethereum = { version = "0.15", default-features = false }
ethereum-types = { version = "0.14", default-features = false }
futures = { version = "0.3.30" }
futures-timer = { version = "3.0" }
futures-util = { version = "0.3", default-features = false }
hex = { version = "0.4.3", default-features = false }
hex-literal = { version = "0.4.1", default-features = false }
impl-trait-for-tuples = { version = "0.2.2" }
jsonrpsee = { version = "0.24.7", default-features = false }
libsecp256k1 = { version = "0.7", default-features = false }
log = { version = "0.4.21", default-features = false }
num_enum = { version = "0.5.3", default-features = false }
once_cell = { version = "1.19.0" }
parity-scale-codec = { version = "3.6", default-features = false, features = [
    "derive",
] }
parking_lot = "0.12.1"
paste = "1.0.14"
primitive-types = "0.12.1"
scale-info = { version = "2.11", default-features = false, features = [
    "derive",
] }
serde = { version = "1.0.197", default-features = false }
serde_json = { version = "1.0.114", default-features = false }
sha3 = { version = "0.10", default-features = false }
slices = "0.2.0"
thiserror = { version = "1.0.63", default-features = false }
tiny-bip39 = { version = "0.8", default-features = false }
tokio = { version = "1.37.0" }
tracing = "0.1.37"
url = { version = "2.4.0" }
wasm-timer = { version = "0.2" }

# Alloy
alloy = { version = "0.11", features = [
    "node-bindings",
    "providers",
    "provider-http",
    "provider-ws",
    "rpc-client",
    "rpc-types",
    "rpc-types-eth",
    "consensus",
    "rlp",
    "contract",
    "sol-types",
    "signers",
] }

