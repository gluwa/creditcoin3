# Example multi-chain configuration for proof-gen-api-server.
# Run: proof-gen-api-server --config /path/to/config.yaml
# Or:  PROOF_GEN_CONFIG_FILE=/path/to/config.yaml proof-gen-api-server
# Creditcoin3 WebSocket URL: set CC3_RPC_URL in .env (or pass --cc3-rpc-url), not in this file.

bind_host: "0.0.0.0"
bind_port: 3100
# cc3_key: "..."  # optional; can use CC3_KEY env instead

chains:
  - chain_key: 2
    eth_rpc_url: "http://localhost:8545"
    # archiver_url: "http://localhost:8080"  # optional per chain
  # - chain_key: 3
  #   eth_rpc_url: "http://localhost:8546"

# redis_url: "redis://127.0.0.1:6379"
redis_cluster_mode: false

# indexer_url: "http://localhost:4000/graphql"

max_batch_size: 10
