---
version: "3.9"

services:
  db:
    image: postgres:alpine
    container_name: proof-gen-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: proofs_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proofs_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    build:
      context: .
      dockerfile: redis.Dockerfile
    container_name: proof-gen-redis
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
