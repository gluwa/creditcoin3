    eth_rpc_url: 'https://blockchain.googleapis.com/v1/projects/creditcoin-test/locations/us-central1/endpoints/ethereum-sepolia/rpc?key=AIzaSyDjbkXkMbvU012NHMZidERUrAoPiEuQASY'
    archiver_url: "https://archiver-sepolia.usc-devnet.creditcoin.network"  # optional per chain
  - chain_key: 11
    eth_rpc_url: "http://134.33.73.11:8545/"
    archiver_url: "https://archiver-sepolia.usc-devnet.creditcoin.network"  # optional per chain

# redis_url: "redis://127.0.0.1:6379"
redis_cluster_mode: false

# indexer_url: "http://localhost:4000/graphql"

max_batch_size: 10
