[package]
authors = { workspace = true }
description = "A Precompile to expose native query verification with Merkle proofs and continuity chains"
edition = "2021"
name = "pallet-evm-precompile-block-prover"
version = "0.1.0"

[lints.clippy]
missing_errors_doc = "allow"
missing_panics_doc = "allow"
no_effect_underscore_binding = "allow"
too_many_arguments = "allow"
type_complexity = "allow"

[dependencies]
log = { workspace = true }

# Moonbeam
precompile-utils = { workspace = true }

# Primitives
attestor-primitives = { workspace = true }

# Pallets
pallet-attestation = { workspace = true, default-features = false }

# Utils
merkle = { workspace = true, default-features = false, features = [
    "precompile-support",
] }
utils = { workspace = true, default-features = false }

# Substrate
frame-support = { workspace = true }
frame-system = { workspace = true }
pallet-balances = { workspace = true }
pallet-timestamp = { workspace = true }
parity-scale-codec = { workspace = true, features = [
    "max-encoded-len",
], default-features = false }
scale-info = { workspace = true, features = ["derive"] }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }

# Frontier
fp-evm = { workspace = true }
pallet-evm = { workspace = true, features = ["forbid-evm-reentrancy"] }

ethabi = { workspace = true, default-features = false }

[dev-dependencies]
derive_more = { workspace = true }
env_logger = { workspace = true }
frame-election-provider-support = { workspace = true }
pallet-attestation = { workspace = true }
pallet-babe = { workspace = true }
pallet-session = { workspace = true }
pallet-staking = { workspace = true }
pallet-staking-reward-curve = { workspace = true, default-features = false }
pallet-supported-chains = { workspace = true }
precompile-utils = { workspace = true, features = ["std", "testing"] }
serde = { workspace = true }
sp-staking = { workspace = true }
supported-chains-primitives = { workspace = true }

[features]
default = ["std"]
std = [
    "log/std",
    "precompile-utils/std",
    "fp-evm/std",
    "frame-support/std",
    "frame-system/std",
    "pallet-balances/std",
    "pallet-timestamp/std",
    "pallet-evm/std",
    "parity-scale-codec/std",
    "scale-info/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "pallet-supported-chains/std",
    "pallet-attestation/std",
    "attestor-primitives/std",
    "pallet-babe/std",
    "utils/std",
    "merkle/std",
    "sp-staking/std",
    "pallet-staking/std",
    "supported-chains-primitives/std",
    "ethabi/std",
]
