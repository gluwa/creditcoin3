[package]
authors = { workspace = true }
edition = "2021"
license = { workspace = true }
name = "pallet-evm-precompile-attest-coin"
publish = false
version = "0.1.0"

[dependencies]
fp-evm = { workspace = true }
frame-support = { workspace = true, default-features = false }
frame-system = { workspace = true }
log = { workspace = true, default-features = false }
pallet-assets = { workspace = true, default-features = false }
pallet-attest-coin-rewards = { workspace = true, default-features = false }
pallet-attestation = { workspace = true, default-features = false }
pallet-evm = { workspace = true, default-features = false, features = [
    "forbid-evm-reentrancy",
] }
pallet-staking = { workspace = true, default-features = false }
pallet-supported-chains = { workspace = true, default-features = false }
parity-scale-codec = { workspace = true, default-features = false, features = [
    "derive",
] }
precompile-utils = { workspace = true, default-features = false }
sp-core = { workspace = true }
sp-io = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-std = { workspace = true }

[dev-dependencies]
attestor-primitives = { workspace = true }
derive_more = { workspace = true }
env_logger = { workspace = true }
frame-election-provider-support = { workspace = true }
pallet-assets = { workspace = true, default-features = false, features = [
    "std",
] }
pallet-babe = { workspace = true, features = ["std"] }
pallet-balances = { workspace = true }
pallet-session = { workspace = true }
pallet-staking = { workspace = true }
pallet-staking-reward-curve = { workspace = true, default-features = false }
pallet-timestamp = { workspace = true }
precompile-utils = { workspace = true, features = ["std", "testing"] }
scale-info = { workspace = true, features = ["derive"] }
serde = { workspace = true }
sp-staking = { workspace = true }
supported-chains-primitives = { workspace = true }

[features]
default = ["std"]
std = [
    "log/std",
    "parity-scale-codec/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "fp-evm/std",
    "frame-support/std",
    "pallet-evm/std",
    "pallet-assets/std",
    "pallet-attest-coin-rewards/std",
    "pallet-attestation/std",
    "pallet-staking/std",
    "pallet-supported-chains/std",
    "frame-system/std",
    "precompile-utils/std",
]
