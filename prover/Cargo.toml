[package]
name = "prover"
version = "0.1.0"
edition = "2021"
publish = false
license = "MIT"

[lib]
path = "src/lib.rs"

[[bin]]
path = "bin/prover.rs"
name = "prover"

[lints.clippy]
pedantic = "warn"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
no_effect_underscore_binding = "allow"
redundant_slicing = "allow"

[package.metadata.release]
release = false

[dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3.3"
nanorand = "0.7.0"
jsonrpsee-http-client = "0.22"
jsonrpsee = "0.22"
jsonrpsee-core = "0.22"
subxt = "0.35"
subxt-signer = "0.35"
anyhow = "1.0.81"
kameo = { version = "0.8" }
alloy = { git = "https://github.com/alloy-rs/alloy", features = [
    "node-bindings",
    "providers",
    "provider-http",
    "provider-ws",
    "rpc-client",
    "rpc-types",
    "rpc-types-eth",
    "serde",
    "consensus",
    "rlp",
] }
once_cell = "1.19.0"
futures-util = "0.3"
futures = "0.3.30"
async-trait = "0.1"
tracing = "0.1.40"
tokio = { version = "1.37.0", features = ["signal"] }
clap = { version = "4.4.18", features = ["derive", "deprecated"] }
thiserror = "1.0"
sp-core = { version = "21.0.0", git = "https://github.com/gluwa/polkadot-sdk", branch = "release-polkadot-v1.1.0-patch", default-features = false }
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
starknet-crypto = "0.6.2"
rand = "0.8.4"

# Creditcoin deps
attestor-primitives = { path = "../primitives/attestor" }
cc-client = { workspace = true }
