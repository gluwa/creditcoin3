---
DISABLE_LINTERS:
  - BASH_SHFMT
  - COPYPASTE_JSCPD
  - REPOSITORY_GRYPE
  # https://gluwa.atlassian.net/browse/CSUB-460
  - REPOSITORY_TRIVY
  - RUST_CLIPPY
  - SPELL_CSPELL
  - SPELL_MISSPELL
  - GRAPHQL_GRAPHQL_SCHEMA_LINTER

GITHUB_COMMENT_REPORTER: false
JSON_PRETTIER_ARGUMENTS: --no-error-on-unmatched-pattern
# Git LFS pointer stubs (see .gitattributes) are not real JSON — jsonlint would fail on them.
# Raw chainspecs are huge anyway.
# Symlink to precompiles/metadata/abi/block_prover.json — duplicate lint; some runners warn on the path.
JSON_JSONLINT_FILTER_REGEX_EXCLUDE: '(chainspecs/(dryRunSpec\.json|dryRunSpecRaw\.json|mainnetSpecRaw\.json)|scripts/traffic-simulator/src/abi/block_prover\.json)'
