[package]
description = "Moonbeam RPC core trace (vendored from Moonbeam, maintained by Gluwa)"
edition = "2021"
license = "GPL-3.0-only"
name = "moonbeam-rpc-core-trace"
version = "0.6.0"

[dependencies]
ethereum-types = { version = "0.15", features = ["std"] }
jsonrpsee = { version = "0.24", features = ["macros", "server"] }
serde = { version = "1", features = ["derive"] }

# Local tracing crates
moonbeam-client-evm-tracing = { path = "../../evm-tracing" }
moonbeam-rpc-core-types = { path = "../types" }
