[package]
description = "EVM tracing events (vendored from Moonbeam, maintained by Gluwa)"
edition = "2021"
license = "GPL-3.0-only"
name = "evm-tracing-events"
version = "0.1.0"

[dependencies]
environmental = { version = "1.1.2", default-features = false }

# Substrate
parity-scale-codec = { version = "3", default-features = false }

# Ethereum
ethereum-types = { version = "0.15", default-features = false }
evm = { git = "https://github.com/rust-ethereum/evm", branch = "v0.x", features = [
    "with-codec",
], default-features = false }
evm-gasometer = { git = "https://github.com/rust-ethereum/evm", branch = "v0.x", default-features = false }
evm-runtime = { git = "https://github.com/rust-ethereum/evm", branch = "v0.x", default-features = false }

[features]
default = ["std"]
evm-tracing = ["evm-gasometer/tracing", "evm-runtime/tracing", "evm/tracing"]
std = [
    "environmental/std",
    "ethereum-types/std",
    "evm-gasometer/std",
    "evm-runtime/std",
    "evm/std",
    "parity-scale-codec/std",
]
