[package]
name = "attestor"
version = "0.1.0"
edition = "2021"
publish = false
license = "MIT"

[lib]
path = "src/lib.rs"

[[bin]]
path = "bin/attestor.rs"
name = "attestor"

[lints.clippy]
pedantic = "warn"
missing_errors_doc = "allow"
missing_panics_doc = "allow"

[package.metadata.release]
release = false

[dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ethers = { version = "2.0", features = ["ws"] }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3.3"
nanorand = "0.7.0"
jsonrpsee-http-client = "0.22"
jsonrpsee = "0.22"
jsonrpsee-core = "0.22"
subxt = "0.35"
subxt-signer = "0.35"
anyhow = "1.0.81"
kameo = "*"

# Workspace deps
tracing.workspace = true
futures.workspace = true
async-trait.workspace = true
tokio.workspace = true
clap.workspace = true
thiserror.workspace = true
sp-core.workspace = true

# Creditcoin deps
creditcoin3-attestor-rpc = { path = "../client/attestor-rpc" }
creditcoin3-attestor-gossip = { path = "../client/attestor-gossip" }
