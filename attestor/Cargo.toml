[package]
name = "attestor"
version = "0.1.0"
edition = "2021"
publish = false
license = "MIT"

[package.metadata.release]
release = false

[dependencies]
tokio = { version = "1.36", features = ["full"] }
async-trait = "0.1"
futures = "0.3.30"
tracing = "0.1.37"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
web3 = "0.19.0"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3.3"
creditcoin3-attestor-rpc = { path = "../client/attestor-rpc" }
creditcoin3-attestor-gossip = { path = "../client/attestor-gossip" }
nanorand = "0.7.0"
jsonrpsee-http-client = "0.22"
jsonrpsee = "0.22"
jsonrpsee-core = "0.22"
subxt = "0.35"
subxt-signer = "0.35"
