---
attestor:
  # Local attestors name
  #   used for display and debug purposes.
  #
  name: "Deep Thought"

  # Source chain to attest to
  #   2: Ethereum Mainnet
  #   3: Ethereum Sepolia
  #
  chain_key: 2

  # Optional: Secret key used to sign attestation votes
  #   If no key is provided a random mnemonic will be used instead.
  #
  # secret: "test test test test test test test test test test test junk"

  # Optional: P2P listening address for libp2p networking
  #   If not specified, a random OS-assigned ipv4 address will be used. Use this
  #   to set a fixed dns address for Kubernetes LoadBalancer services.
  #
  # public_addr: attestor.dev

  # Optional: Path to the logs folder
  #   If not specified, defaults to ./logs.
  #
  # logs: ./logs

api:
  # Optional: API endpoints port
  #   If not specified, defaults to 9100.
  #
  # port: 9100

p2p:
  # Optional: Boot nodes for peer discovery
  #   Used to establish a map of available peers
  #
  # boot_nodes: []

  # Optional: Fixed P2P port for libp2p networking
  #   If not specified, defaults to 9000.
  #
  # port: 9000

eth:
  # Eth RPC url
  #   Used to pull source chain data and generate continuity proofs. Attestors
  #   are advised to run their own RPC server.
  #
  url: "ws://localhost:8545"

cc3:
  # CC3 RPC url
  #   Used to listen to CC3 events and storage changes. Attestors are advised to
  #   run their own RPC server.
  #
  url: "ws://localhost:9944"

attestation:
  # Optional: Initial height from which new attestations are produced
  #   If no starting height is specified, attestations will be generated from
  #   that source chain's configured genesis block number instead.
  #
  # start_height: 0

  # Optional: Source chain block interval at which new attestations are produced
  #   By default this value is fetched from on-chain storage. This options
  #   overrides it.
  #
  # interval: 10

write_ability:
  # USC cross-chain message attestation. When enabled, the attestor watches the
  # Creditcoin L1 Outbox for its chain_key and gossips ECDSA message votes on the
  # existing p2p swarm (topic {chain_key}/message-votes/v1). It never relays.
  #
  # The Creditcoin L1 EVM RPC used to watch the Outbox is derived from the `cc3:`
  # url above, and the Outbox is resolved entirely on-chain from chain_key
  # (chain-info precompile -> OutboxFactory -> getOutbox). If no factory/Outbox is
  # registered for this chain_key, write-ability stays disabled for the run (the
  # rest of the attestor keeps running normally).
  enabled: true

  # Authorized message-vote signer EVM addresses (the static attestor set). The
  # 2N/3+1 quorum is derived from its size. Each attestor logs its own derived
  # signer address at startup. These defaults are the deterministic addresses of
  # the first three zombienet attestors launched with `--well-known-keys`
  # (//Alice, //Bob, //Charlie).
  attestors:
    - "0x3C3224ECf3e12ec671D200a2802a2525Fa1B04aC"  # zombie 0 (//Alice)
    - "0x0aC32750Ed79f301248afD9B398cc5723911c392"  # zombie 1 (//Bob)
    - "0x4910156288781F080d81c607E3a830a7019d9Bc6"  # zombie 2 (//Charlie)

  # Optional: on-chain EOAValidator address. If set, takes precedence over the
  # static `attestors` list above: the attestor reads the authorized set from
  # `EOAValidator.attestors()` on the destination chain (the chain this attestor
  # set attests, i.e. the `eth` url) — the same on-chain source of truth the Inbox
  # uses. Keeps the set in lockstep with the validator without hand-maintaining it.
  #
  # validator_address: "0x..."

  # Confirmation depth below the EVM tip before signing a MessagePublished log.
  # Defaults to 3 (matches Creditcoin time-to-finality).
  #
  # block_confirmation_depth: 3

  # Anti-abuse bounds.
  #
  # max_tracked_messages: 10000
  # vote_ttl_secs: 3600
