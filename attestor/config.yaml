---
attestor:
  # Local attestors name
  #   used for display and debug purposes.
  #
  name: "Deep Thought"

  # Source chain to attest to
  #   2: Ethereum Mainnet
  #   3: Ethereum Sepolia
  #
  chain_key: 2

  # Optional: Secret key used to sign attestation votes
  #   If no key is provided a random mnemonic will be used instead.
  #
  # secret: "test test test test test test test test test test test junk"

  # Optional: P2P listening address for libp2p networking
  #   If not specified, a random OS-assigned ipv4 address will be used. Use this
  #   to set a fixed dns address for Kubernetes LoadBalancer services.
  #
  # public_addr: attestor.dev

  # Optional: Path to the logs folder
  #   If not specified, defaults to ./logs.
  #
  # logs: ./logs

api:
  # Optional: API endpoints port
  #   If not specified, defaults to 9100.
  #
  # port: 9100

p2p:
  # Optional: Boot nodes for peer discovery
  #   Used to establish a map of available peers
  #
  # boot_nodes: []

  # Optional: Fixed P2P port for libp2p networking
  #   If not specified, defaults to 9000.
  #
  # port: 9000

eth:
  # Eth RPC url
  #   Used to pull source chain data and generate continuity proofs. Attestors
  #   are advised to run their own RPC server.
  #
  url: "ws://localhost:8545"

cc3:
  # CC3 RPC url
  #   Used to listen to CC3 events and storage changes. Attestors are advised to
  #   run their own RPC server.
  #
  url: "ws://localhost:9944"

attestation:
  # Optional: Initial height from which new attestations are produced
  #   If no starting height is specified, attestations will be generated from
  #   that source chain's configured genesis block number instead.
  #
  # start_height: 0

  # Optional: Source chain block interval at which new attestations are produced
  #   By default this value is fetched from on-chain storage. This options
  #   overrides it.
  #
  # interval: 10

write_ability:
  # USC cross-chain message attestation. Disabled unless `enabled: true` (or the
  # --message-attestation flag). When on, the attestor watches the Creditcoin L1
  # Outbox for this chain_key and gossips ECDSA message votes on the existing p2p
  # swarm (new topic {chain_key}/message-votes/v1). It never relays.
  #
  # enabled: false

  # Creditcoin L1 EVM JSON-RPC endpoint (watches the Outbox). Required when enabled.
  #
  # cc3_eth_url: "ws://localhost:8546"

  # Authorized message-vote signer EVM addresses (the static attester set). The
  # 2N/3+1 quorum is derived from its size. Your own derived signer address is
  # logged at startup — register it in the destination EOAValidator and include it
  # here. (Alternatively set validator_address to read an on-chain IVoteValidator —
  # not yet wired in the attestor.)
  #
  # attesters:
  #   - "0x0000000000000000000000000000000000000001"
  #   - "0x0000000000000000000000000000000000000002"

  # Optional outbox resolution overrides. By default the Outbox factory is read from
  # the chain-info precompile (SupportedChains::OutboxFactories) and the bytes32 key
  # is derived from chain_key.
  #
  # outbox_factory_address: "0x..."
  # write_ability_chain_key: "0x..."
  # outbox_address: "0x..."          # direct override, skips the factory lookup

  # Confirmation depth below the EVM tip before signing a MessagePublished log.
  #
  # block_confirmation_depth: 12

  # Anti-abuse bounds.
  #
  # max_tracked_messages: 10000
  # vote_ttl_secs: 3600
