apiVersion: v1
kind: Service
metadata:
  name: creditcoin-node
  namespace: ${NAMESPACE}
  labels:
    app: creditcoin-node
spec:
  clusterIP: None
  selector:
    app: creditcoin-node
  ports:
    - name: p2p
      port: 30333
      targetPort: 30333
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: creditcoin-node-0
  namespace: ${NAMESPACE}
  labels:
    app: creditcoin-node
    role: bootnode
spec:
  selector:
    app: creditcoin-node
    statefulset.kubernetes.io/pod-name: creditcoin-node-0
  ports:
    - name: ws
      port: 9944
      targetPort: 9944
      protocol: TCP
    - name: rpc
      port: 9933
      targetPort: 9933
      protocol: TCP
    - name: p2p
      port: 30333
      targetPort: 30333
      protocol: TCP
    - name: prometheus
      port: 9615
      targetPort: 9615
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: creditcoin-node
  namespace: ${NAMESPACE}
spec:
  serviceName: creditcoin-node
  replicas: ${NODE_COUNT}
  selector:
    matchLabels:
      app: creditcoin-node
  podManagementPolicy: OrderedReady
  template:
    metadata:
      labels:
        app: creditcoin-node
        role: validator
    spec:
      containers:
        - name: creditcoin-node
          image: gluwa/creditcoin3:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 9944
              name: ws
            - containerPort: 9933
              name: rpc
            - containerPort: 30333
              name: p2p
            - containerPort: 9615
              name: prometheus
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # StatefulSet pod name looks like: creditcoin-node-0, creditcoin-node-1, ...
              NODE_NAME="${HOSTNAME}"
              NODE_INDEX="${NODE_NAME##*-}"

              # Pick dev account flags by index (0..4), fallback to generic validator
              DEV_FLAGS=""
              case "$NODE_INDEX" in
                0) DEV_FLAGS="--alice" ;;
                1) DEV_FLAGS="--bob" ;;
                2) DEV_FLAGS="--charlie" ;;
                3) DEV_FLAGS="--dave" ;;
                4) DEV_FLAGS="--eve" ;;
                *) DEV_FLAGS="" ;;
              esac

              # Only non-zero nodes should use a bootnode
              BOOTNODE_FLAGS=""
              if [ "$NODE_INDEX" -ne 0 ]; then
                BOOTNODE_FLAGS="--bootnodes=/dns/creditcoin-node-0.${NAMESPACE}.svc.cluster.local/tcp/30333/p2p/12D3KooWEyoppNCUx8Yx66oV9fJnriXwCcXwDDUA2kj6vnc6iDEp"
              fi

              exec /bin/creditcoin3-node \
                --base-path=/data \
                --chain=/chainspec.json \
                --name=dryrun-node-${NODE_INDEX} \
                --validator \
                ${DEV_FLAGS} \
                ${BOOTNODE_FLAGS} \
                --rpc-cors=all \
                --rpc-methods=unsafe \
                --rpc-external \
                --ws-external \
                --prometheus-external \
                --port=30333 \
                --rpc-port=9933 \
                --ws-port=9944
          volumeMounts:
            - name: data
              mountPath: /data
            - name: chainspec
              mountPath: /chainspec.json
              subPath: chainspec.json
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9933
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9933
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: chainspec
          configMap:
            name: chainspec
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
