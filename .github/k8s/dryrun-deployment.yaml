---
# Bootnode (Alice) - Node 0
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: creditcoin-node-0
  namespace: creditcoin-dryrun
spec:
  serviceName: creditcoin-node-0
  replicas: 1
  selector:
    matchLabels:
      app: creditcoin-node
      node-id: "0"
  template:
    metadata:
      labels:
        app: creditcoin-node
        node-id: "0"
        role: bootnode
    spec:
      containers:
        - name: creditcoin-node
          image: gluwa/creditcoin3:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 9944
              name: ws
            - containerPort: 9933
              name: rpc
            - containerPort: 30333
              name: p2p
            - containerPort: 9615
              name: prometheus
          command:
            - /bin/creditcoin3-node
          args:
            - --base-path=/data
            - --chain=/chainspec.json
            - --name=dryrun-node-0
            - --validator
            - --alice
            - --rpc-cors=all
            - --rpc-methods=unsafe
            - --rpc-external
            - --ws-external
            - --prometheus-external
            - --port=30333
            - --rpc-port=9933
            - --ws-port=9944
          volumeMounts:
            - name: data
              mountPath: /data
            - name: chainspec
              mountPath: /chainspec.json
              subPath: chainspec.json
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9933
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9933
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: chainspec
          configMap:
            name: chainspec
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
