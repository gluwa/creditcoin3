---
version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    groups:
      all-dependencies:
        dependency-type: "production"
        applies-to: version-updates

  # Maintain dependencies for Docker images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    groups:
      all-dependencies:
        dependency-type: "production"
        applies-to: version-updates

  # Maintain dependencies for Rust
  # Note: Dependabot can't recursively search directories at the moment
  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/attestor"
      - "/attestor_zombienet"
      - "/client/attestor-gossip"
      - "/client/attestor-rpc"
      - "/client/evm-tracing"
      - "/client/rpc-core/debug"
      - "/client/rpc-core/trace"
      - "/client/rpc-core/types"
      - "/client/rpc/debug"
      - "/client/rpc/trace"
      - "/common/bls-signatures"
      - "/common/cc-client"
      - "/common/eth"
      - "/common/mmr"
      - "/common/utils"
      - "/host"
      - "/node"
      - "/node/cli-opt"
      - "/pallets/attestation-poc"
      - "/pallets/prover"
      - "/pallets/supported-chains"
      - "/precompiles/claim"
      - "/precompiles/substrate-transfer"
      - "/primitives/account"
      - "/primitives/attestation_chain"
      - "/primitives/attestor"
      - "/primitives/core"
      - "/primitives/ext"
      - "/primitives/prover"
      - "/primitives/rpc/debug"
      - "/primitives/rpc/evm-tracing-events"
      - "/primitives/supported-chains"
      - "/proof"
      - "/prover"
      - "/runtime"
      - "/runtime/evm_tracer"
      - "/runtime/generate-bags"
    groups:
      prod-dependencies:
        dependency-type: "production"
        applies-to: version-updates
      dev-dependencies:
        dependency-type: "development"
        applies-to: version-updates
    schedule:
      interval: "monthly"

  - package-ecosystem: "cargo"
    directory: "/runtime/generate-bags"
    schedule:
      interval: "monthly"

  # Maintain dependencies for Node.js
  - package-ecosystem: "npm"
    directories:
      - "/attestor/scripts"
      - "/cli"
      - "/docs/smart-contract-development/with-hardhat"
      - "/docs/smart-contract-development/with-ethers.js"
      - "/testing"
    groups:
      prod-dependencies:
        dependency-type: "production"
        applies-to: version-updates
      dev-dependencies:
        dependency-type: "development"
        applies-to: version-updates
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
