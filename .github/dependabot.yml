---
version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    groups:
      all-dependencies:
        dependency-type: "production"
        applies-to: version-updates

  # Maintain dependencies for Docker images
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/cc3-indexer"
      - "/cc3-indexer/postgres"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    groups:
      all-dependencies:
        dependency-type: "production"
        applies-to: version-updates

  # Maintain dependencies for docker-compose files
  - package-ecosystem: "docker-compose"
    directories:
      - "/"
      - "/cc3-indexer"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    groups:
      docker-compose:
        dependency-type: "production"
        applies-to: version-updates

  # Maintain dependencies for Rust
  # Note: Dependabot can't recursively search directories at the moment
  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/attestor"
      - "/attestor_zombienet"
      - "/client/attestor-gossip"
      - "/client/attestor-rpc"
      - "/common/cc-client"
      - "/common/eth"
      - "/common/mmr"
      - "/common/utils"
      - "/common/vrf"
      - "/common/prometheus"
      - "/node"
      - "/node/cli-opt"
      - "/pallets/attestation-poc"
      - "/pallets/randomness"
      - "/pallets/supported-chains"
      - "/precompiles/chain-info"
      - "/precompiles/block-prover"
      - "/precompiles/substrate-transfer"
      - "/precompiles/signature-verifier"
      - "/primitives/account"
      - "/primitives/attestor"
      - "/primitives/core"
      - "/primitives/randomness"
      - "/primitives/supported-chains"
      - "/query-cli"
      - "/runtime"
      - "/runtime/generate-bags"
      - "/usc_audit_automation"
    groups:
      prod-dependencies:
        dependency-type: "production"
        applies-to: version-updates
      dev-dependencies:
        dependency-type: "development"
        applies-to: version-updates
    schedule:
      interval: "monthly"

  # Maintain dependencies for Node.js
  - package-ecosystem: "npm"
    directories:
      - "/attestor/scripts"
      - "/bridge-usage-example"
      - "/cc3-indexer"
      - "/cli"
      - "/common/eth/contracts"
      - "/common/eth/contracts/get-contract-state"
      - "/docs/smart-contract-development/with-hardhat"
      - "/docs/smart-contract-development/with-ethers.js"
      - "/"
    groups:
      prod-dependencies:
        dependency-type: "production"
        applies-to: version-updates
      dev-dependencies:
        dependency-type: "development"
        applies-to: version-updates
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Python dependencies for Linode
  - package-ecosystem: "pip"
    directories:
      - "/.github"
    groups:
      linode-dependencies:
        dependency-type: "production"
        applies-to: version-updates
    schedule:
      interval: "monthly"
