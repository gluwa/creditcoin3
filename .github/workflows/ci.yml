        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          # WARNING: using env.RUNNER_VM_NAME directly in job outputs above
          # doesn't evaluate the $GITHUB_RUN_ID reference
          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Provision VM
        if: env.LC_GITHUB_REPO_ADMIN_TOKEN
        run: |
          .github/provision-linode-vm.sh
        env:
          LC_OWNER_REPO_SLUG: ${{ github.repository }}
          LC_GITHUB_REPO_ADMIN_TOKEN: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}
          LC_PROXY_ENABLED: ${{ matrix.proxy }}
          LC_PROXY_SECRET_VARIANT: ${{ matrix.secret }}
          LC_PROXY_TYPE: ${{ matrix.proxy_type }}
          LC_WORKFLOW_ID: ${{ github.run_id }}
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}

      - name: Upload Linode logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: linode-${{ matrix.proxy }}-${{ matrix.secret }}-${{ matrix.proxy_type }}-logs
          path: retry*.json

  integration-test-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: "no"

          - proxy: "yes"
            secret: no-funds

          - proxy: "yes"
            secret: not-a-proxy

          - proxy: "yes"
            secret: valid-proxy
            proxy_type: Staking

          - proxy: "yes"
            secret: valid-proxy
            proxy_type: NonTransfer

          - proxy: "yes"
            secret: valid-proxy
            proxy_type: All

    name: integration-test-cli / proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}
    needs:
      - build-creditcoin-node-for-testing-ci
      - deploy-runner-integration-test-cli
    runs-on:
      [
        self-hosted,
        "workflow-${{ github.run_id }}",
        "proxy-${{ matrix.proxy }}",
        "secret-${{ matrix.secret }}",
        "type-${{ matrix.proxy_type }}",
      ]
    # checkov:skip=CKV2_GHA_1:We need this for typedefs auto-commit
    permissions: write-all
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}

      # WARNING: always before actions/download-artifact
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: subxt-cli

      - name: Install subxt-cli
        run: |
          cargo install subxt-cli@0.37.0 --locked

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install -g yarn

      # WARNING: always after Swatinem/rust-cache
      - name: Download creditcoin-node binary
        uses: actions/download-artifact@v6
        with:
          name: binary-for-testing-ci
          path: target/release

      - name: DEBUG
        continue-on-error: true
        run: |
          ls -l  ./target/
          ls -lR ./target/release/
          md5sum ./target/release/creditcoin3-node

      - name: Start creditcoin3-node in order to update typedefs
        run: |
          chmod a+x ./target/release/creditcoin3-node
          ./target/release/creditcoin3-node \
            --chain dev \
            --validator --alice  --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --base-path ./alice-data &

      - name: Wait for nodes to start
        run: |
          ./.github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate precompiles ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Install openzeppelin dependencies
        working-directory: ./common/eth/contracts/
        run: |
          npm install

      - name: Compile Hardhat contract(s)
        working-directory: ./docs/smart-contract-development/with-hardhat
        run: |
          npm install
          npx hardhat compile

      - name: Install creditcoin-cli dependencies
        working-directory: ./cli
        run: |
          yarn install

      - name: Check that Creditcoin chain has ETH blocks
        working-directory: ./cli
        run: |
          yarn build
          node dist/scripts/eth-check.js ws://127.0.0.1:9944

      - name: Auto-update typedefs
        id: update_typedefs
        working-directory: ./cli
        run: |
          ./get-metadata.sh
          subxt metadata -f bytes > ../common/cc-client/artifacts/metadata.scale

          # kill the node b/c the tests will launch their own processes
          killall -9 creditcoin3-node

          yarn build:types
          yarn format

          echo "========== DEBUG DEBUG DEBUG =========="
          git status --short --untracked-files=no
          git diff
          echo "======================================="

          # do not update if only creditcoin.json has changed,
          # usually happens on version bump without any real metadata change
          # shellcheck disable=SC2143
          if [ -n "$(git status --short --untracked-files=no | grep -v yarn.lock | grep -v creditcoin.json | grep -v metadata.scale)" ]; then
              git diff
              echo "git_diff=true" >> "$GITHUB_OUTPUT"
          else
              echo "git_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extra ENV for PRs towards dev branch
        if: github.base_ref == 'dev'
        id: for-dev-prs
        run: |
          echo "========== DEBUG DEBUG DEBUG =========="
          echo "${{ github.base_ref }}"
          echo "======================================="

          echo "validator_cycle=no" >> "$GITHUB_OUTPUT"

      - name: Extra ENV for other PRs and commits
        if: github.base_ref != 'dev'
        id: non-dev-prs
        run: |
          echo "========== DEBUG DEBUG DEBUG =========="
          echo "${{ github.base_ref }}"
          echo "======================================="

          echo "validator_cycle=yes" >> "$GITHUB_OUTPUT"

      # note: potentially rebuilds with newer type definitions
      - name: Build creditcoin-cli
        working-directory: ./cli
        run: |
          yarn build

      - name: Run integration tests
        working-directory: ./cli
        run: |
          yarn test:validator-cli
        env:
          RUST_LOG: debug
          PROXY_ENABLED: ${{ matrix.proxy }}
          PROXY_SECRET_VARIANT: ${{ matrix.secret }}
          PROXY_TYPE: ${{ matrix.proxy_type }}
          EXECUTE_VALIDATOR_CYCLE_TEST_SCENARIO: ${{ steps.for-dev-prs.outputs.validator_cycle || steps.non-dev-prs.outputs.validator_cycle }}

      - name: Kill nodes
        if: always()
        continue-on-error: true
        run: |
          # if all went well kill the node. Otherwise GitHub Actions would exit on the
          # previous step killing everything and we don't have to worry about
          # dangling processes
          killall -9 creditcoin3-node

      - name: Upload logs from Alice and Bob
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: Alice-and-Bob-logs-for-run-proxy-${{ matrix.proxy }}-${{ matrix.secret }}-type-${{ matrix.proxy_type }}
          path: /tmp/creditcoin3-node-*.std*

      - name: Commit changes for typedefs
        if: ${{ (github.base_ref == 'dev' || github.base_ref == 'poc_external_attestation_network') && env.GITHUB_TOKEN && success() && steps.update_typedefs.outputs.git_diff == 'true' && matrix.proxy == 'no' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: EndBug/add-and-commit@v9
        with:
          add: "cli/creditcoin.json cli/src/lib/interfaces/ common/cc-client/artifacts/metadata.scale"
          author_name: gluwa-bot
          author_email: creditcoin@gluwa.com
          message: "Auto-update metadata & TypeScript type definitions"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for uncommitted changes for typedefs on PR against non-default branches
        # NOTE: not checking matrix condition on purpose! In case some of the jobs have failed we want
        # maximum opportunities to expose uncommitted typedefs changes for a PR against non-default branches!
        if: ${{ github.base_ref != 'dev' && github.base_ref != 'poc_external_attestation_network' && steps.update_typedefs.outputs.git_diff == 'true' }}
        run: |
            echo "FAIL: it appears there are uncommitted typedefs changes which is not supposed to happen"
            echo "TODO: make sure these changes make it to the default branch first!"

            echo "========== DEBUG DEBUG DEBUG =========="
            git status --short --untracked-files=no
            git diff
            echo "======================================="
            exit 1

      - name: Upload coverage report as artifact
        if: ${{ matrix.proxy == 'yes' && matrix.proxy_type == 'All' }}
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-cli-coverage-report
          path: cli/src/test/coverage/

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  deploy-runner-blockchain:
    needs:
      - build-creditcoin-node-for-testing-ci
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: blockchain

    name: deploy-runner / proxy=${{ matrix.proxy }} /  / type=
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # See https://github.com/actions/runner/issues/1879#issuecomment-1123196869
      - name: Create matrix.txt
        run: |
          echo "proxy=${{ matrix.proxy }} /  / type=" > matrix.txt

      - name: Evaluate env vars
        id: get-env
        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          # WARNING: using env.RUNNER_VM_NAME directly in job outputs above
          # doesn't evaluate the $GITHUB_RUN_ID reference
          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Provision VM
        if: env.LC_GITHUB_REPO_ADMIN_TOKEN
        run: |
          .github/provision-linode-vm.sh
        env:
          LC_OWNER_REPO_SLUG: ${{ github.repository }}
          LC_GITHUB_REPO_ADMIN_TOKEN: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}
          LC_PROXY_ENABLED: ${{ matrix.proxy }}
          LC_WORKFLOW_ID: ${{ github.run_id }}
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}

      - name: Upload Linode logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: linode-${{ matrix.proxy }}-logs
          path: retry*.json

  integration-test-blockchain:
    needs:
      - build-creditcoin-node-for-testing-ci
      - deploy-runner-blockchain
    runs-on: [self-hosted, "proxy-blockchain"]
    steps:
      - uses: actions/checkout@v5

      - name: Download creditcoin-node binary
        uses: actions/download-artifact@v6
        with:
          name: binary-for-testing-ci
          path: target/release

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install -g yarn

      - name: Start Node 1
        env:
          RUST_LOG: debug
        run: |
          # configure the path so we can discover external binaries
          PROVER_PATH=$(readlink -f ./cairo/stone-prover)
          SCRIPTS_PATH=$(readlink -f ./cairo/scripts)
          VERIFIER_PATH=$(readlink -f ./cairo/stone-verifier)
          export PATH="$PATH:$PROVER_PATH:$SCRIPTS_PATH:$VERIFIER_PATH"

          mkdir -p /var/tmp/integration-test-blockchain/
          chmod a+x ./target/release/creditcoin3-node
          ./target/release/creditcoin3-node \
            --chain dev \
            --validator --alice  --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --ethapi=debug,trace,txpool \
            --base-path ./alice-data >/var/tmp/integration-test-blockchain/creditcoin3-node.log 2>&1 &

      - name: Wait for node(s)s to start
        run: |
          ./.github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate precompiles ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Install openzeppelin dependencies
        working-directory: ./common/eth/contracts/
        run: |
          npm install

      - name: Compile Hardhat contract(s)
        working-directory: ./docs/smart-contract-development/with-hardhat
        run: |
          npm install
          npx hardhat compile

      - name: Install creditcoin-cli dependencies
        working-directory: ./cli
        run: |
          yarn install

      - name: Collect pallet storage versions from Local chain
        working-directory: ./cli
        run: |
          sudo apt-get install colordiff

          node dist/scripts/queryPalletVersions.js ws://127.0.0.1:9944 2>/dev/null | sort > /var/tmp/pallet_storage.local

      - name: Compare to pallet storage versions from Devnet
        working-directory: ./cli
        run: |
          node dist/scripts/queryPalletVersions.js wss://rpc.ccnext-devnet.creditcoin.network/ws 2>/dev/null | sort > /var/tmp/pallet_storage.devnet
          DIFF_OUTPUT=$(diff -u /var/tmp/pallet_storage.devnet /var/tmp/pallet_storage.local)

          if [ -n "$DIFF_OUTPUT" ]; then
              echo "FAIL: difference in pallet storage versions detected"
              echo "$DIFF_OUTPUT" | colordiff
              exit 1
          fi

      - name: Compare to pallet storage versions from Testnet
        working-directory: ./cli
        run: |
          node dist/scripts/queryPalletVersions.js wss://rpc.usc-testnet.creditcoin.network/ws 2>/dev/null | sort > /var/tmp/pallet_storage.testnet
          DIFF_OUTPUT=$(diff -u /var/tmp/pallet_storage.testnet /var/tmp/pallet_storage.local)

          if [ -n "$DIFF_OUTPUT" ]; then
              echo "FAIL: difference in pallet storage versions detected"
              echo "$DIFF_OUTPUT" | colordiff
              exit 1
          fi

      - name: Run blockchain tests
        working-directory: ./cli
        run: |
          # configure the path so we can discover external binaries
          VERIFIER_PATH=$(readlink -f ../cairo/stone-verifier)
          export PATH="$PATH:$VERIFIER_PATH"

          yarn test:blockchain

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-blockchain
          path: |
            /var/tmp/pallet_storage.*
            /var/tmp/integration-test-blockchain/
          include-hidden-files: true

      - name: Kill nodes
        if: always()
        continue-on-error: true
        run: |
          # if all went well kill the node. Otherwise GitHub Actions would exit on the
          # previous step killing everything and we don't have to worry about
          # dangling processes
          killall -9 creditcoin3-node

  integration-test-chainspec:
