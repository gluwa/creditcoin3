  sanity-test-precompiles:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Solidity compiler
        run: |
          sudo add-apt-repository ppa:ethereum/ethereum
          sudo apt-get update
          sudo apt-get install colordiff solc

      - name: Generate ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Upload generated ABI
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: precompiles-abi
          path: precompiles/metadata/abi/*.json

      - name: Prepare ENV for Devnet
        id: devnet-env
        if: github.base_ref == 'dev'
        run: |
          echo "target_chain=devnet" >> "$GITHUB_OUTPUT"

      - name: Prepare ENV for Testnet
        id: testnet-env
        if: github.base_ref == 'testnet'
        run: |
          echo "target_chain=testnet" >> "$GITHUB_OUTPUT"

      - name: Prepare ENV for Mainnnet
        id: mainnet-env
        if: github.base_ref == 'main'
        run: |
          echo "target_chain=mainnet" >> "$GITHUB_OUTPUT"

      - name: Check
        run: |
          export TARGET_CHAIN="${{ steps.devnet-env.outputs.target_chain || steps.testnet-env.outputs.target_chain || steps.mainnet-env.outputs.target_chain }}"
          .github/check-solidity-source-vs-metadata.sh


  fmt:
    name: Rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: gluwa/toolchain@dev
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          profile: minimal
          override: true
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        uses: gluwa/cargo@dev
        with:
          command: fmt
          args: -- --check

      - name: Check TOML formatting
        run: |
          cargo install taplo-cli --locked
          taplo format --check

  clippy:
    name: Clippy
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-clippy"]
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: gluwa/toolchain@dev
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          target: wasm32-unknown-unknown
          profile: minimal
          override: true
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        uses: gluwa/cargo@dev
        with:
          command: clippy
          args: --all-targets --all-features -- -D warnings -A clippy::too_many_arguments -A clippy::type_complexity

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  check:
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-check"]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: gluwa/toolchain@dev
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          target: wasm32-unknown-unknown
          profile: minimal
          override: true
      - uses: Swatinem/rust-cache@v2

      - name: Check featalign
        run: |
          cargo install cargo-featalign

          # produces a human readable output
          cargo featalign runtime --features std,runtime-benchmarks,fast-runtime,devnet --workspace-only --default-std --depth -1 --mode check | jq

          # exit with non-zero on error
          cargo featalign runtime --features std,runtime-benchmarks,fast-runtime,devnet --workspace-only --default-std --depth -1 --mode check

      - name: Check Build
        run: |
          SKIP_WASM_BUILD=1 cargo check --release

      - name: Check Build for Benchmarking
        run: |
          SKIP_WASM_BUILD=1 cargo check --features=runtime-benchmarks --release

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  unit-test-creditcoin:
    runs-on:
      [
        self-hosted,
        "workflow-${{ github.run_id }}",
        "proxy-unit-test-creditcoin",
      ]
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: gluwa/toolchain@dev
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          components: llvm-tools-preview
          target: wasm32-unknown-unknown
          profile: minimal
          override: true
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.42.37
        with:
          tool: cargo-llvm-cov

      - name: Run tests
        run: |
          cargo llvm-cov \
              --workspace --html --show-missing-lines --hide-instantiations \
              --ignore-filename-regex "(tests.rs|mock.rs)"

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html/

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  build-creditcoin-node:
    strategy:
      fail-fast: false
      matrix:
        target: [devnet, testnet]
    name: build-creditcoin-node-for-${{ matrix.target }}
    runs-on:
      [
        self-hosted,
        "workflow-${{ github.run_id }}",
        "proxy-build-creditcoin-node-for-${{ matrix.target }}",
      ]
    steps:
      - uses: actions/checkout@v4

      - name: Set-Up
        run: |
          sudo apt-get update
          sudo apt install -y curl

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: gluwa/toolchain@dev
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          target: wasm32-unknown-unknown
          profile: minimal
          override: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-creditcoin-node

      - name: Extra compiler flags
        if: matrix.target == 'devnet'
        id: compiler-flags
        run: |
          echo "extra=--features=fast-runtime --features=devnet" >> "$GITHUB_OUTPUT"

      - name: Build SUT
        uses: gluwa/cargo@dev
        with:
          command: build
          args: --release ${{ steps.compiler-flags.outputs.extra }}

      - name: Upload creditcoin-node binary
        uses: actions/upload-artifact@v4
        with:
          name: creditcoin-node-${{ matrix.target }}
          path: target/release/creditcoin3-node

      - name: Upload WASM runtime
        uses: actions/upload-artifact@v4
        with:
          name: creditcoin_node_runtime.compact.compressed.wasm-${{ matrix.target }}
          path: target/release/wbuild/creditcoin3-runtime/creditcoin_next_runtime.compact.compressed.wasm

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  build-creditcoin-node-for-testing:
    needs:
      - build-creditcoin-node
    strategy:
      fail-fast: false
      matrix:
        target: [devnet, ci]
    name: build-creditcoin-node-for-testing-${{ matrix.target }}
    runs-on:
      [
        self-hosted,
        "workflow-${{ github.run_id }}",
        "proxy-build-creditcoin-node-for-testing-${{ matrix.target }}",
      ]
    steps:
      - uses: actions/checkout@v4

      - name: Set-Up
        run: |
          sudo apt-get update
          sudo apt install -y curl

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: gluwa/toolchain@dev
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          target: wasm32-unknown-unknown
          profile: minimal
          override: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-creditcoin-node

      - name: Extra compiler flags
        if: matrix.target == 'devnet'
        id: compiler-flags
        run: |
          echo "extra=--features=devnet" >> "$GITHUB_OUTPUT"

      - name: Build SUT
        uses: gluwa/cargo@dev
        with:
          command: build
          args: --release --features=fast-runtime --features=runtime-benchmarks ${{ steps.compiler-flags.outputs.extra }}

      - name: Upload creditcoin-node binary
        uses: actions/upload-artifact@v4
        with:
          name: creditcoin-node-for-testing-${{ matrix.target }}
          path: target/release/creditcoin3-node

      - name: Upload attestor binaries
        uses: actions/upload-artifact@v4
        with:
          name: attestor-for-testing-${{ matrix.target }}
          path: |
            target/release/attestor
            target/release/attestor_zombienet

      - name: Upload prover binary
        uses: actions/upload-artifact@v4
        with:
          name: prover-for-testing-${{ matrix.target }}
          path: target/release/prover

      - name: Upload query-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: query-cli-for-testing-${{ matrix.target }}
          path: target/release/query-cli

      - name: Upload WASM runtime
        uses: actions/upload-artifact@v4
        with:
          name: creditcoin_node_runtime.compact.compressed.wasm-for-${{ matrix.target }}
          path: target/release/wbuild/creditcoin3-runtime/creditcoin_next_runtime.compact.compressed.wasm

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  integration-test-smart-contract:
    needs:
      - build-creditcoin-node-for-testing
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-smart-contract"]
    steps:
      - uses: actions/checkout@v4

      - name: Download creditcoin-node binary
        uses: actions/download-artifact@v4
        with:
          name: creditcoin-node-for-testing-ci
          path: target/release

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Start Node 1 - Alice
        run: |
          chmod a+x ./target/release/creditcoin3-node
          ./target/release/creditcoin3-node \
            --dev --validator --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --base-path ./alice-data &

      - name: Wait for node(s) to start
        run: |
          ./.github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'

      - name: Configure testing environment
        id: test-env
        working-directory: ./cli
        run: |
          yarn install
          EVM_PRIVATE_KEY=$(node dist/test/blockchainSetup.js)
          echo "url=http://127.0.0.1:9944" >> "$GITHUB_OUTPUT"
          echo "private_key=$EVM_PRIVATE_KEY" >> "$GITHUB_OUTPUT"

      - name: Execute smart contract test tool
        working-directory: ./testing
        run: |
          ./evm-network-test.sh ${{ steps.test-env.outputs.url }} ${{ steps.test-env.outputs.private_key }}

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  integration-test-check-extrinsics:
    if: github.base_ref == 'dev'
    needs:
      - build-creditcoin-node-for-testing
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Node Dependencies
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts -g @polkadot/metadata-cmp

      - name: Download creditcoin-node binary
        uses: actions/download-artifact@v4
        with:
          name: creditcoin-node-for-testing-ci
          path: target/release

      - name: Run Extrinsics Ordering
        shell: bash
        run: |
          chmod a+x ./target/release/creditcoin3-node
          ./.github/check-extrinsics.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          OWNER_REPO_SLUG: ${{ github.repository }}

      #Upload logs if nodes are not connecting.
      #head-node.log and release-node.log are created in ./scripts/check-extrinsics.sh
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          if-no-files-found: warn
          name: "extrinsic-logs"
          path: |
            head-node.log
            release-node.log
            # disabled until we have mainnet
            # metadata-cmp-with-mainnet.txt
            metadata-cmp-with-testnet.txt

  unit-test-cli:
    if: github.base_ref == 'dev'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g yarn

      - name: Execute tests
        working-directory: ./cli
        run: |
          yarn install
          yarn test:unit

      - uses: codecov/codecov-action@v4
        with:
          files: cli/coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  deploy-github-runner:
    # WARNING: same matrix as integration-test-cli job
    strategy:
      fail-fast: false
      matrix:
        include:
          # runners for other jobs (repurpose existing labels)
          - proxy: attestator-network
          - proxy: benchmark
          - proxy: build-creditcoin-node-for-devnet
          - proxy: build-creditcoin-node-for-testnet
          - proxy: build-creditcoin-node-for-testing-devnet
          - proxy: build-creditcoin-node-for-testing-ci
          - proxy: clippy
          - proxy: check
          - proxy: docker-build
          - proxy: smart-contract
          - proxy: unit-test-creditcoin

          # runners for integration-test-cli-jobs
          - proxy: no

          - proxy: yes
            secret: no-funds

          - proxy: yes
            secret: not-a-proxy

          - proxy: yes
            secret: valid-proxy
            proxy_type: Staking

          - proxy: yes
            secret: valid-proxy
            proxy_type: NonTransfer

          - proxy: yes
            secret: valid-proxy
            proxy_type: All

    name: deploy-github-runner / proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # See https://github.com/actions/runner/issues/1879#issuecomment-1123196869
      - name: Create matrix.txt
        run: |
          echo "proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}" > matrix.txt

      - name: Evaluate env vars
        id: get-env
        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          # WARNING: using env.RUNNER_VM_NAME directly in job outputs above
          # doesn't evaluate the $GITHUB_RUN_ID reference
          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Provision VM
        if: env.LC_GITHUB_REPO_ADMIN_TOKEN
        run: |
          .github/provision-linode-vm.sh
        env:
          LC_OWNER_REPO_SLUG: ${{ github.repository }}
          LC_GITHUB_REPO_ADMIN_TOKEN: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
          LC_RUNNER_EPHEMERAL: false
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}
          LC_PROXY_ENABLED: ${{ matrix.proxy }}
          LC_PROXY_SECRET_VARIANT: ${{ matrix.secret }}
          LC_PROXY_TYPE: ${{ matrix.proxy_type }}
          LC_WORKFLOW_ID: ${{ github.run_id }}
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}

  remove-github-runner:
    runs-on: ubuntu-24.04
    needs:
      - benchmark
      - build-creditcoin-node
      - build-creditcoin-node-for-testing
      - integration-test-attestator-network
      - integration-test-cli
      - clippy
      - check
      - docker-build
      - unit-test-creditcoin
      - integration-test-smart-contract
    if: ${{ always() }}

    # WARNING: same matrix as integration-test-cli job
    strategy:
      fail-fast: false
      matrix:
        include:
          # runners for other jobs (repurpose existing labels)
          - proxy: attestator-network
          - proxy: benchmark
          - proxy: build-creditcoin-node-for-devnet
          - proxy: build-creditcoin-node-for-testnet
          - proxy: build-creditcoin-node-for-testing-devnet
          - proxy: build-creditcoin-node-for-testing-ci
          - proxy: clippy
          - proxy: check
          - proxy: docker-build
          - proxy: smart-contract
          - proxy: unit-test-creditcoin

          # runners for integration-test-cli-jobs
          - proxy: no

          - proxy: yes
            secret: no-funds

          - proxy: yes
            secret: not-a-proxy

          - proxy: yes
            secret: valid-proxy
            proxy_type: Staking

          - proxy: yes
            secret: valid-proxy
            proxy_type: NonTransfer

          - proxy: yes
            secret: valid-proxy
            proxy_type: All

    name: remove-github-runner / proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}

    steps:
      - uses: actions/checkout@v4

      # See https://github.com/actions/runner/issues/1879#issuecomment-1123196869
      - name: Create matrix.txt
        run: |
          echo "proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}" > matrix.txt

      - name: Evaluate env vars
        id: get-env
        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Remove VM
        continue-on-error: true
        run: |
          .github/remove-linode-vm.sh
        env:
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}

  integration-test-attestator-network:
    needs:
      - build-creditcoin-node-for-testing
    runs-on:
      [
        self-hosted,
        "proxy-attestator-network",
      ]
    steps:
      - uses: actions/checkout@v4

      - name: Download creditcoin-node binary
        uses: actions/download-artifact@v4
        with:
          name: creditcoin-node-for-testing-ci
          path: target/release

      - name: Download attestor binaries
        uses: actions/download-artifact@v4
        with:
          name: attestor-for-testing-ci
          path: target/release

      - name: Start creditcoin3-node - Alice
        run: |
          chmod a+x ./target/release/creditcoin3-node
          ./target/release/creditcoin3-node \
            --chain dev \
            --validator --alice  --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --base-path ./alice-data &

      - name: Start Ethereum simulation with Anvil
        run: |
          # first install it
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

          ~/.foundry/bin/anvil --block-time 6 &

      - name: Check that creditcoin-node and anvil are running
        run: |
          .github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'
          .github/wait-for-ethereum.sh 'http://127.0.0.1:8545'

      - name: Start Attestation Zombienet
        run: |
          chmod a+x ./target/release/attestor*

          # adjust path to binary b/c running from the root dir of the repository
          sed -i 's|default_command: ".*"|default_command: "./target/release/attestor"|' attestor_zombienet/config.yaml

          # always use 5 attestors when running in CI
          sed -i "s/num_attestors: .*/num_attestors: 5/" attestor_zombienet/config.yaml

          ./target/release/attestor_zombienet --cc3-key "//Alice" --config-file attestor_zombienet/config.yaml &

      - name: Wait for 5 attestors to be registered
        run: |
          .github/wait-for-attestors.sh 'http://127.0.0.1:9944'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g yarn

      - name: Run attestation tests
        working-directory: ./cli
        run: |
          yarn install
          yarn test:attestation

      - name: Kill binaries
        if: always()
        continue-on-error: true
        run: |
          # if all went well kill the node. Otherwise GitHub Actions would exit on the
          # previous step killing everything and we don't have to worry about
          # dangling processes
          killall -9 attestor_zombienet
          killall -9 attestor
          killall -9 creditcoin3-node

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown


  integration-test-cli:
    if: github.base_ref == 'dev'
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: no

          - proxy: yes
            secret: no-funds

          - proxy: yes
            secret: not-a-proxy

          - proxy: yes
            secret: valid-proxy
            proxy_type: Staking

          - proxy: yes
            secret: valid-proxy
            proxy_type: NonTransfer

          - proxy: yes
            secret: valid-proxy
            proxy_type: All

    name: integration-test-cli / proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}
    needs:
      - build-creditcoin-node-for-testing
    runs-on:
      [
        self-hosted,
        "workflow-${{ github.run_id }}",
        "proxy-${{ matrix.proxy }}",
        "secret-${{ matrix.secret }}",
        "type-${{ matrix.proxy_type }}",
      ]
    # checkov:skip=CKV2_GHA_1:We need this for typedefs auto-commit
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Download creditcoin-node binary
        uses: actions/download-artifact@v4
        with:
          name: creditcoin-node-for-testing-ci
          path: target/release

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: gluwa/toolchain@dev
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          profile: minimal
          override: true

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: subxt-cli

      - name: Install subxt-cli
        run: |
          cargo install subxt-cli --locked

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g yarn

      - name: Start creditcoin3-node in order to update typedefs
        run: |
          chmod a+x ./target/release/creditcoin3-node
          ./target/release/creditcoin3-node \
            --chain dev \
            --validator --alice  --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --base-path ./alice-data &

      - name: Wait for nodes to start
        run: |
          ./.github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'

      - name: Install creditcoin-cli dependencies
        working-directory: ./cli
        run: |
          yarn install

      - name: Auto-update typedefs
        id: update_typedefs
        working-directory: ./cli
        run: |
          ./get-metadata.sh
          subxt metadata -f bytes > ../common/cc-client/artifacts/metadata.scale

          # kill the node b/c the tests will launch their own processes
          killall -9 creditcoin3-node

          yarn build:types
          yarn format

          echo "========== DEBUG DEBUG DEBUG =========="
          git status --short --untracked-files=no
          git diff
          echo "======================================="

          # do not update if only creditcoin.json has changed,
          # usually happens on version bump without any real metadata change
          # shellcheck disable=SC2143
          if [ -n "$(git status --short --untracked-files=no | grep -v yarn.lock | grep -v creditcoin.json)" ]; then
              git diff
              echo "git_diff=true" >> "$GITHUB_OUTPUT"
          else
              echo "git_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extra ENV for PRs towards dev branch
        if: github.base_ref == 'dev'
        id: for-dev-prs
        run: |
          echo "========== DEBUG DEBUG DEBUG =========="
          echo "${{ github.base_ref }}"
          echo "======================================="

          echo "validator_cycle=no" >> "$GITHUB_OUTPUT"

      - name: Extra ENV for other PRs and commits
        if: github.base_ref != 'dev'
        id: non-dev-prs
        run: |
          echo "========== DEBUG DEBUG DEBUG =========="
          echo "${{ github.base_ref }}"
          echo "======================================="

          echo "validator_cycle=yes" >> "$GITHUB_OUTPUT"

      - name: Build creditcoin-cli
        working-directory: ./cli
        run: |
          yarn build

      - name: Run integration tests
        working-directory: ./cli
        run: |
          yarn test:integration
        env:
          PROXY_ENABLED: ${{ matrix.proxy }}
          PROXY_SECRET_VARIANT: ${{ matrix.secret }}
          PROXY_TYPE: ${{ matrix.proxy_type }}
          EXECUTE_VALIDATOR_CYCLE_TEST_SCENARIO: ${{ steps.for-dev-prs.outputs.validator_cycle || steps.non-dev-prs.outputs.validator_cycle }}

      - name: Kill nodes
        if: always()
        continue-on-error: true
        run: |
          # if all went well kill the node. Otherwise GitHub Actions would exit on the
          # previous step killing everything and we don't have to worry about
          # dangling processes
          killall -9 creditcoin3-node

      - name: Upload logs from Alice and Bob
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Alice-and-Bob-logs-for-run-proxy-${{ matrix.proxy }}-${{ matrix.secret }}-type-${{ matrix.proxy_type }}
          path: /tmp/creditcoin3-node-*.std*

      - name: Commit changes for typedefs
        if: ${{ env.GITHUB_TOKEN && success() && steps.update_typedefs.outputs.git_diff == 'true' && matrix.proxy == 'no' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: EndBug/add-and-commit@v9
        with:
          add: "cli/creditcoin.json cli/src/lib/interfaces/ common/cc-client/artifacts/metadata.scale"
          author_name: gluwa-bot
          author_email: creditcoin@gluwa.com
          message: "Auto-update metadata & TypeScript type definitions"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload code coverage
        uses: codecov/codecov-action@v4
        with:
          files: cli/coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

