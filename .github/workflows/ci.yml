  deploy-runner-benchmark:
    needs:
      - build-creditcoin-node-for-testing-benchmarks
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: benchmark

    name: deploy-runner / proxy=${{ matrix.proxy }} /  / type=
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # See https://github.com/actions/runner/issues/1879#issuecomment-1123196869
      - name: Create matrix.txt
        run: |
          echo "proxy=${{ matrix.proxy }} /  / type=" > matrix.txt

      - name: Evaluate env vars
        id: get-env
        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          # WARNING: using env.RUNNER_VM_NAME directly in job outputs above
          # doesn't evaluate the $GITHUB_RUN_ID reference
          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Provision VM
        if: env.LC_GITHUB_REPO_ADMIN_TOKEN
        run: |
          .github/provision-linode-vm.sh
        env:
          LC_OWNER_REPO_SLUG: ${{ github.repository }}
          LC_GITHUB_REPO_ADMIN_TOKEN: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}
          LC_PROXY_ENABLED: ${{ matrix.proxy }}
          LC_WORKFLOW_ID: ${{ github.run_id }}
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}

      - name: Upload Linode logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: linode-${{ matrix.proxy }}-logs
          path: retry*.json

  benchmark:
    needs:
      # because of the shared cache
      - build-creditcoin-node-for-testing-benchmarks
      - deploy-runner-benchmark
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-benchmark"]
    steps:
      - uses: actions/checkout@v5

      - name: Inspect benchmark CI config
        run: |
          # WARNING: Command below may differ depending on which workflow config file
          # your job is defined in !!! Don't copy&paste it blindly !!!
          PALLETS_IN_CI_CONFIG=$(grep " .github/bench.sh -p" .github/workflows/ci.yml | grep -v PALLETS_IN_CI_CONFIG | tr -s ' ' | cut -d' ' -f4 | sort | xargs)

          PALLETS_IN_SOURCE=$(.github/check-parity-bw-extrinsics-benchmarks-weights.sh --show-pallets)
          if [ "$PALLETS_IN_CI_CONFIG" != "$PALLETS_IN_SOURCE" ]; then
              echo "FAIL: Pallet mismatch between source code and benchmark CI config"
              echo "INFO: in source: '$PALLETS_IN_SOURCE'"
              echo "INFO: CI config: '$PALLETS_IN_CI_CONFIG'"
              exit 1
          fi

      - name: Set-Up
        run: |
          sudo apt-get update
          sudo apt install -y curl

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          targets: wasm32-unknown-unknown
          components: rust-src

      # use cache from previous build jobs
      # WARNING: always before actions/download-artifact
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-creditcoin-node

      # WARNING: always after Swatinem/rust-cache
      - name: Download creditcoin-node binary
        uses: actions/download-artifact@v6
        with:
          name: binary-for-testing-benchmarks
          path: target/release

      - name: DEBUG
        continue-on-error: true
        run: |
          ls -l  ./target/
          ls -lR ./target/release/
          md5sum ./target/release/creditcoin3-node

      - name: Check if runner machine meets chain's requirements
        continue-on-error: true
        run: |
          chmod a+x ./target/release/creditcoin3-node
          .github/check-hardware.sh

      - name: Run benchmarks to generate dummy weights
        run: |
          # configure the path so we can discover external binaries
          PROVER_PATH=$(readlink -f ./cairo/stone-prover)
          SCRIPTS_PATH=$(readlink -f ./cairo/scripts)
          VERIFIER_PATH=$(readlink -f ./cairo/stone-verifier)
          export PATH="$PATH:$PROVER_PATH:$SCRIPTS_PATH:$VERIFIER_PATH"

          .github/bench.sh -p attestation_poc -b -r 1 -s 2
          .github/bench.sh -p prover -b -r 1 -s 2
          .github/bench.sh -p randomness -b -r 1 -s 2
          .github/bench.sh -p supported_chains -b -r 1 -s 2

      - name: git diff
        run: |
          git diff

      # check if automatically generated weights compile
      - name: Rebuild SUT with newly generated weights
        uses: gluwa/cargo@dev
        with:
          command: build
          args: --release

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  deploy-runner-cc3-indexer:
