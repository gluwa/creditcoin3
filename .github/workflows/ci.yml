  cc3-indexer-testing:
    needs:
      - build-creditcoin-node-for-testing-ci
      - deploy-runner-cc3-indexer
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-cc3-indexer"]
    steps:
      - uses: actions/checkout@v5

      - name: Download binaries
        uses: actions/download-artifact@v6
        with:
          name: binary-for-testing-ci
          path: target/release

      - name: Set up Python for Cairo - Verifier + Prover
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
      - run: pip install -r prover/requirements.txt

      - name: Start creditcoin3-node - Alice
        env:
          RUST_LOG: debug
        run: |
          # configure the path so we can discover external binaries
          PROVER_PATH=$(readlink -f ./cairo/stone-prover)
          SCRIPTS_PATH=$(readlink -f ./cairo/scripts)
          VERIFIER_PATH=$(readlink -f ./cairo/stone-verifier)
          export PATH="$PATH:$PROVER_PATH:$SCRIPTS_PATH:$VERIFIER_PATH"

          mkdir -p /var/tmp/cc3-indexer-testing/
          chmod a+x ./target/release/creditcoin3-node
          ./target/release/creditcoin3-node \
            --chain dev \
            --validator --alice  --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --unsafe-rpc-external --rpc-cors all \
            --base-path ./alice-data >/var/tmp/cc3-indexer-testing/creditcoin3-node.log 2>&1 &

      - name: Start Ethereum simulation with Anvil - several chains
        run: |
          export FOUNDRY_DIR="$HOME/.foundry"
          # first install it
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

          # supported chain keys are hard-coded in attestor/src/cc3.rs and node/src/chain_spec.rs
          # Anvil1 == chain_key(2), Anvil2 == chain_key(4). Ports are arbitrary
          # Anvil3 == chain_key(5) - will be registered dynamically
          ~/.foundry/bin/anvil --block-time 6 --chain-id 31337 --port 8141 &
          ~/.foundry/bin/anvil --block-time 6 --chain-id 31338 --port 8242 &
          ~/.foundry/bin/anvil --block-time 6 --chain-id 31339 --port 8343 &

      - name: Check that creditcoin-node and anvil are running
        run: |
          .github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'
          .github/wait-for-ethereum.sh 'http://127.0.0.1:8141'
          .github/wait-for-ethereum.sh 'http://127.0.0.1:8242'
          .github/wait-for-ethereum.sh 'http://127.0.0.1:8343'

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Simulate a native token transfer on Anvil 1
        id: native-transfer-anvil-1
        working-directory: attestor/scripts
        run: |
          npm install

          OUTPUT=$(ETH_RPC_URL=http://127.0.0.1:8141 node Transfer.js)
          echo "$OUTPUT"

          BLOCK_NUMBER=$(echo "$OUTPUT" | grep block: | cut -f2 -d: | tr -d ' ')
          TXN_HASH=$(echo "$OUTPUT" | grep hash: | cut -f2 -d: | tr -d ' ')

          echo "block_number=$BLOCK_NUMBER" >> "$GITHUB_OUTPUT"
          echo "txn_hash=$TXN_HASH" >> "$GITHUB_OUTPUT"

      - name: Start Attestation Zombienet for Alice - Anvil 1
        run: |
          chmod a+x ./target/release/attestor*

          # adjust path to binary b/c running from the root dir of the repository
          sed -i 's|default_command: ".*"|default_command: "./target/release/attestor"|' attestor_zombienet/config.yaml

          mkdir -p /var/tmp/cc3-indexer-testing/attestors-alice

          ./target/release/attestor_zombienet \
                --verbose \
                --cc3-key "//Alice" --chain-key 2 \
                --eth-rpc-url ws://localhost:8141 --config-file attestor_zombienet/config.yaml \
                --logs-dir /var/tmp/cc3-indexer-testing/attestors-alice/ &

      # note: not started explicitly; used within tests
      - name: Start Attestation Zombienet for Bob - Anvil 2
        if: false
        run: |
          # configure the path so we can discover external binaries
          PROVER_PATH=$(readlink -f ./cairo/stone-prover)
          SCRIPTS_PATH=$(readlink -f ./cairo/scripts)
          VERIFIER_PATH=$(readlink -f ./cairo/stone-verifier)
          export PATH="$PATH:$PROVER_PATH:$SCRIPTS_PATH:$VERIFIER_PATH"

          mkdir -p /var/tmp/cc3-indexer-testing/attestors-bob

          ./target/release/attestor_zombienet \
                --verbose \
                --cc3-key "//Bob" --chain-key 4 \
                --eth-rpc-url ws://localhost:8242 --config-file attestor_zombienet/config.yaml \
                --logs-dir /var/tmp/cc3-indexer-testing/attestors-bob/ &

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Install openzeppelin dependencies
        working-directory: ./common/eth/contracts/
        run: |
          npm install

      - name: Compile Hardhat contract(s)
        working-directory: ./docs/smart-contract-development/with-hardhat
        run: |
          npm install
          npx hardhat compile

      - name: Start Attestation Zombienet for Charlie - Anvil 3
        run: |
          chmod a+x ./target/release/attestor*

          # adjust path to binary b/c running from the root dir of the repository
          sed -i 's|default_command: ".*"|default_command: "./target/release/attestor"|' attestor_zombienet/config.yaml

          mkdir -p /var/tmp/cc3-indexer-testing/attestors-charlie

          ./target/release/attestor_zombienet \
                --cc3-key "//Charlie" --chain-key 5 \
                --eth-rpc-url ws://localhost:8343 --config-file attestor_zombienet/config.yaml \
                --logs-dir /var/tmp/cc3-indexer-testing/attestors-charlie/ &

      - name: Wait for 3 attestors to be registered
        run: |
          # note: chain_key is hard-coded in this script so waiting only on Anvil_1
          .github/wait-for-attestors.sh 'http://127.0.0.1:9944'

      - name: Start prover DBs
        working-directory: ./prover
        run: |
          sed -ie '/ports/{N; d;}' docker-compose.yaml
          docker compose pull
          docker compose --project-name anvil-1 up -d
          docker compose --project-name anvil-2 up -d

          # wait for DBs to start accepting connections
          sleep 60

      - name: Start Prover for Alice - Anvil-1
        env:
          RUST_LOG_STYLE: never
        run: |
          # configure the path so we can discover external binaries
          PROVER_PATH=$(readlink -f ./cairo/stone-prover)
          SCRIPTS_PATH=$(readlink -f ./cairo/scripts)
          VERIFIER_PATH=$(readlink -f ./cairo/stone-verifier)
          export PATH="$PATH:$PROVER_PATH:$SCRIPTS_PATH:$VERIFIER_PATH"

          DB_ADDR=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' anvil-1-postgres-1)

          chmod a+x ./target/release/prover
          ./target/release/prover \
            --verbose \
            --cc3-key "//Alice"   \
            --cc3-evm-private-key "0x5fb92d6e98884f76de468fa3f6278f8807c48bebc13595d45af5bdc4da702133" \
            --eth-rpc-url ws://127.0.0.1:8141 \
            --postgres-uri "postgres://prover:prover@$DB_ADDR/attestations" \
            --name "Prover-for-Alice-num-1" \
            > /var/tmp/cc3-indexer-testing/prover-1.log 2>&1 &

      - name: Start Prover for Bob - Anvil-2
        if: false # note: started explicitly within tests
        env:
          RUST_LOG_STYLE: never
        run: |
          # configure the path so we can discover external binaries
          PROVER_PATH=$(readlink -f ./cairo/stone-prover)
          SCRIPTS_PATH=$(readlink -f ./cairo/scripts)
          VERIFIER_PATH=$(readlink -f ./cairo/stone-verifier)
          export PATH="$PATH:$PROVER_PATH:$SCRIPTS_PATH:$VERIFIER_PATH"

          DB_ADDR=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' anvil-2-postgres-1)

          chmod a+x ./target/release/prover
          ./target/release/prover \
            --verbose \
            --cc3-key "//Bob"   \
            --cc3-evm-private-key "0x8075991ce870b93a8870eca0c0f91913d12f47948ca0fd25b49c6fa7cdbeee8b" \
            --eth-rpc-url ws://127.0.0.1:8242 \
            --postgres-uri "postgres://prover:prover@$DB_ADDR/attestations" \
            --name "Prover-for-Bob-num-1" \
            > /var/tmp/cc3-indexer-testing/prover-2.log 2>&1 &

      - name: Setup cc3-indexer
        working-directory: ./cc3-indexer
        run: |
          yarn install

          # overwrite .env before building & starting the application
          GENESIS_HASH=$(curl --silent -H "Content-Type: application/json" \
            -d '{"id": 1, "jsonrpc": "2.0", "method": "chain_getBlockHash", "params": [0] }' \
            http://127.0.0.1:9944 | jq -r .result)
          echo "ENDPOINT=ws://host.docker.internal:9944/" > .env
          echo "CHAIN_ID=$GENESIS_HASH" >> .env
          echo "DATASOURCE=all-in-one" >> .env

          yarn build

          docker compose pull
          docker compose up -d
          sleep 30

      - name: Run integration tests for cc3-indexer
        working-directory: ./cli
        run: |
          yarn install
          yarn test:cc3-indexer

      - name: Collect logs
        if: always()
        working-directory: ./cc3-indexer
        run: |
          docker compose logs --no-color > /var/tmp/cc3-indexer-testing/indexer-compose.log
          docker cp cc3-indexer-subquery-node-1:/.monitor /var/tmp/cc3-indexer-testing/

      - name: Check cc3-indexer logs for errors
        if: always()
        run: |
          .github/check-logs-for-error.sh /var/tmp/cc3-indexer-testing/indexer-compose.log

          sudo apt-get install colordiff
          .github/check-cc3-indexer-handlers.sh /var/tmp/cc3-indexer-testing/.monitor/app-fileA.txt

      - name: Sanity check Int vs BigInt data types
        if: always()
        run: |
          .github/check-grapqhl-schema-types.sh

      - name: Run query-cli e2e
        if: always()
        run: |
          PROVER_SOL_ADDR=$(grep "Gluwa Public Prover contract deploy at" /var/tmp/cc3-indexer-testing/prover-1.log | rev | cut -f1 -d' ' | rev)

          chmod a+x ./target/release/query-cli
          ./target/release/query-cli \
            --cc3-rpc-url ws://127.0.0.1:9944 \
            --cc3-evm-private-key "8075991ce870b93a8870eca0c0f91913d12f47948ca0fd25b49c6fa7cdbeee8b" \
            --prover-contract-address "$PROVER_SOL_ADDR" \
            --eth-rpc-url ws://127.0.0.1:8141 \
            --block-height ${{ steps.native-transfer-anvil-1.outputs.block_number }} \
            --txn-hash ${{ steps.native-transfer-anvil-1.outputs.txn_hash }} \
            --data-choice 4

      - name: Collect Prover DB logs
        if: always()
        working-directory: ./prover
        run: |
          docker compose --project-name anvil-1 logs --no-color > /var/tmp/cc3-indexer-testing/prover-1-db.log
          docker compose --project-name anvil-2 logs --no-color > /var/tmp/cc3-indexer-testing/prover-2-db.log

      # WARNING: upload logs before killing running processes b/c the created temporary directories
      # may be removed once the program exits. Read about the implementation details at:
      # https://docs.rs/tempfile/latest/tempfile/struct.TempDir.html
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cc3-indexer-testing
          path: /var/tmp/cc3-indexer-testing/
          include-hidden-files: true

      - name: Kill processes
        if: always()
        continue-on-error: true
        run: |
          docker compose -f cc3-indexer/docker-compose.yaml down

          killall -9 attestor_zombienet
          killall -9 attestor
          killall -9 creditcoin3-node
          killall -9 prover
          docker compose -f prover/docker-compose.yaml -p anvil-1 down
          docker compose -f prover/docker-compose.yaml -p anvil-2 down

  rm-gh-runner-cc3-indexer:
    runs-on: ubuntu-24.04
    needs:
      - cc3-indexer-testing
    if: ${{ always() }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: cc3-indexer

    steps:
      - uses: actions/checkout@v5

      # See https://github.com/actions/runner/issues/1879#issuecomment-1123196869
      - name: Create matrix.txt
        run: |
          echo "proxy=${{ matrix.proxy }} /  / type=" > matrix.txt

      - name: Evaluate env vars
        id: get-env
        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Remove VM
        continue-on-error: true
        run: |
          .github/remove-linode-vm.sh
        env:
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}

  # preceeds all of the attestor-cli jobs so that we can
  # easily trigger all of them when something fails
  trigger-attestor-cli:
    needs:
      - build-creditcoin-node-for-testing-ci
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

  deploy-runner-attestor-cli:
    needs:
      - trigger-attestor-cli
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: "no"

          - proxy: "yes"
            secret: no-funds

          - proxy: "yes"
            secret: not-a-proxy

          - proxy: "yes"
            secret: valid-proxy
            proxy_type: All

    name: runner-attestor-cli / proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # See https://github.com/actions/runner/issues/1879#issuecomment-1123196869
      - name: Create matrix.txt
        run: |
          echo "proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}" > matrix.txt

      - name: Evaluate env vars
        id: get-env
        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          # WARNING: using env.RUNNER_VM_NAME directly in job outputs above
          # doesn't evaluate the $GITHUB_RUN_ID reference
          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Provision VM
        if: env.LC_GITHUB_REPO_ADMIN_TOKEN
        run: |
          .github/provision-linode-vm.sh
        env:
          LC_OWNER_REPO_SLUG: ${{ github.repository }}
          LC_GITHUB_REPO_ADMIN_TOKEN: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}-attestor-cli
          LC_PROXY_ENABLED: ${{ matrix.proxy }}
          LC_PROXY_SECRET_VARIANT: ${{ matrix.secret }}
          LC_PROXY_TYPE: ${{ matrix.proxy_type }}
          LC_WORKFLOW_ID: ${{ github.run_id }}-attestor-cli
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}

      - name: Upload Linode logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: linode-attestor-cli-${{ matrix.proxy }}-${{ matrix.secret }}-${{ matrix.proxy_type }}-logs
          path: retry*.json

  attestor-cli-testing:
    needs:
      - build-creditcoin-node-for-testing-ci
      - deploy-runner-attestor-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: "no"

          - proxy: "yes"
            secret: no-funds

          - proxy: "yes"
            secret: not-a-proxy

          - proxy: "yes"
            secret: valid-proxy
            proxy_type: All

    name: attestor-cli-testing / proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}
    runs-on:
      [
        self-hosted,
        "workflow-${{ github.run_id }}-attestor-cli",
        "proxy-${{ matrix.proxy }}",
        "secret-${{ matrix.secret }}",
        "type-${{ matrix.proxy_type }}",
      ]
    steps:
      - uses: actions/checkout@v5

      - name: Download binaries
        uses: actions/download-artifact@v6
        with:
          name: binary-for-testing-ci
          path: target/release

      - name: Download subkey binary
        uses: actions/download-artifact@v6
        with:
          name: subkey
          path: ~/.cargo/bin

      - name: Start creditcoin3-node in order to update typedefs
        run: |
          chmod a+x ./target/release/attestor

          chmod a+x ~/.cargo/bin/subkey
          sudo cp ~/.cargo/bin/subkey /usr/local/bin
          subkey --version

          chmod a+x ./target/release/creditcoin3-node
          ./target/release/creditcoin3-node \
            --chain dev \
            --validator --alice  --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --base-path ./alice-data &

      - name: Wait for nodes to start
        run: |
          ./.github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'

      - name: Start Ethereum simulation with Anvil
        run: |
          # first install it
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

          # supported chain keys are hard-coded in attestor/src/cc3.rs and node/src/chain_spec.rs
          # Anvil1 == chain_key(2), Anvil2 == chain_key(4). Ports are arbitrary
          ~/.foundry/bin/anvil --block-time 6 --chain-id 31337 --port 8141 &

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install -g yarn

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate precompiles ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Install openzeppelin dependencies
        working-directory: ./common/eth/contracts/
        run: |
          npm install

      - name: Compile Hardhat contract(s)
        working-directory: ./docs/smart-contract-development/with-hardhat
        run: |
          npm install
          npx hardhat compile

      - name: Install creditcoin-cli dependencies
        working-directory: ./cli
        run: |
          yarn install

      - name: Check that Creditcoin chain has ETH blocks
        working-directory: ./cli
        run: |
          yarn build
          node dist/scripts/eth-check.js ws://127.0.0.1:9944

      - name: Auto-update typedefs
        working-directory: ./cli
        run: |
          ./get-metadata.sh

          # kill the node b/c the tests will launch their own processes
          killall -9 creditcoin3-node

          yarn build:types
          yarn format

          echo "========== DEBUG DEBUG DEBUG =========="
          git status --short --untracked-files=no
          git diff
          echo "======================================="

      # note: potentially rebuilds with newer type definitions
      - name: Build creditcoin-cli
        working-directory: ./cli
        run: |
          yarn build

      - name: Run integration tests
        working-directory: ./cli
        run: |
          yarn test:attestor-cli
        env:
          RUST_LOG: debug
          PROXY_ENABLED: ${{ matrix.proxy }}
          PROXY_SECRET_VARIANT: ${{ matrix.secret }}
          PROXY_TYPE: ${{ matrix.proxy_type }}

      - name: Kill nodes
        if: always()
        continue-on-error: true
        run: |
          # if all went well kill the node. Otherwise GitHub Actions would exit on the
          # previous step killing everything and we don't have to worry about
          # dangling processes
          killall -9 creditcoin3-node

      - name: Upload logs from Alice and Bob
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logs-for-attestor-cli-proxy-${{ matrix.proxy }}-${{ matrix.secret }}-type-${{ matrix.proxy_type }}
          path: |
            /tmp/attestor-*.std*
            /tmp/creditcoin3-node-*.std*

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  rm-gh-runner-attestor-cli:
    runs-on: ubuntu-24.04
    needs:
      - attestor-cli-testing
    if: ${{ always() }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # runners for integration-test-cli-jobs
          - proxy: "no"

          - proxy: "yes"
            secret: no-funds

          - proxy: "yes"
            secret: not-a-proxy

          - proxy: "yes"
            secret: valid-proxy
            proxy_type: All

    name: remove-attestor-cli / proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}

    steps:
      - uses: actions/checkout@v5

      # See https://github.com/actions/runner/issues/1879#issuecomment-1123196869
      - name: Create matrix.txt
        run: |
          echo "proxy=${{ matrix.proxy }} / ${{ matrix.secret }} / type=${{ matrix.proxy_type }}" > matrix.txt

      - name: Evaluate env vars
        id: get-env
        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Remove VM
        continue-on-error: true
        run: |
          .github/remove-linode-vm.sh
        env:
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}-attestor-cli
