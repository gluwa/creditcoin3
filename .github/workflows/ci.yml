---
name: CI

# Controls when the action will run.
"on":
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: read-all

env:
  RUNNER_VM_NAME: "${{ github.event.repository.name }}-$GITHUB_RUN_ID-attempt-$GITHUB_RUN_ATTEMPT"
  LINODE_REGION: "nl-ams"
  # Shared CPU, Linode 8 GB, 4 vCPU, 96 $/mo
  LINODE_VM_SIZE: "g6-standard-4"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  docker-build:
    needs:
      - deploy-runner-docker-build
    uses: ./.github/workflows/build-docker.yml
    with:
      build-options: "BUILD_ARGS="
      version-string: "latest"
      runs-on: "['self-hosted', 'workflow-${{ github.run_id }}', 'proxy-docker-build']"

  docker-test:
    needs:
      - deploy-runner-docker-test
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-docker-test"]
    steps:
      - name: Download locally built docker image
        uses: actions/download-artifact@v6
        with:
          name: locally-built-docker-image
          path: ${{ runner.temp }}/gluwa/

      - name: Load locally built docker image
        run: |
          docker load --input ${{ runner.temp }}/${{ github.repository }}.tar
          docker images

      - uses: actions/checkout@v5

      - name: Start a Devnet container from image
        run: |
          # see https://opensource.com/article/18/5/how-find-ip-address-linux
          IP_ADDRESS=$(curl https://ifconfig.me)
          echo "INFO: IP_ADDRESS=$IP_ADDRESS"

          docker run --rm --name creditcoin-validator -d -p 9944:9944 -p 30333:30333 ${{ github.repository }} \
              --dev --validator \
              --pruning archive \
              --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
              --unsafe-rpc-external

      - name: Healtcheck
        if: false
        run: |
          sleep 60
          .github/check-health.sh

      - name: Sanity test creditcoin-cli inside the container
        run: |
          docker exec creditcoin-validator which creditcoin
          docker exec creditcoin-validator creditcoin wizard --help
          docker exec creditcoin-validator creditcoin attestor --help

      - name: Sanity check for chainspecs inside the container
        run: |
          for f in chainspecs/*.json; do
              spec=$(basename "$f")
              docker exec creditcoin-validator  ls -l "/$spec"
          done

      - name: Sanity check other binaries inside the container
        run: |
          docker exec creditcoin-validator which attestor
          docker exec creditcoin-validator attestor --help

          docker exec creditcoin-validator which attestor_zombienet
          docker exec creditcoin-validator attestor_zombienet --help

          docker exec creditcoin-validator which query-cli
          docker exec creditcoin-validator query-cli --help

          docker exec creditcoin-validator which prover
          docker exec creditcoin-validator prover --help

      - name: Sanity check Cairo components inside the container
        run: |
          docker exec creditcoin-validator which cairo-compile
          docker exec creditcoin-validator cairo-compile --help

          docker exec creditcoin-validator which cairo-run
          docker exec creditcoin-validator cairo-run --help

          docker exec creditcoin-validator which cpu_air_prover
          docker exec creditcoin-validator cpu_air_prover --help | grep "Flags from"

          docker exec creditcoin-validator which cpu_air_verifier
          docker exec creditcoin-validator cpu_air_verifier --help | grep "Flags from"

          docker exec creditcoin-validator which verify_merkle_proof.sh
          docker exec creditcoin-validator verify_merkle_proof.sh | grep "expected arguments: input_path proof_mode"

          docker exec creditcoin-validator which stone_prove_query.sh
          docker exec creditcoin-validator stone_prove_query.sh | grep "expected arguments: input_path"

      - name: Collect docker logs
        if: always()
        run: |
          docker logs creditcoin-validator >docker-creditcoin-validator.log 2>&1

      - name: Kill the container
        run: |
          sudo killall -9 creditcoin3-node
          sleep 10
          docker rm -f creditcoin-validator
          sleep 10

      - name: Start validator via compose
        run: |
          docker compose up -d

      - name: Sanity check for persistently mounted directory
        run: |
          sleep 60
          docker exec creditcoin-validator ls -ld /creditcoin-node/data
          docker exec creditcoin-validator ls -la /creditcoin-node/data

      - name: Collect compose logs
        if: always()
        run: |
          docker compose logs --no-color > docker-compose-validator.log

      - name: Kill the validator container
        run: |
          # note: killall will report failure if process had crashed
          sudo killall -9 creditcoin3-node

          # while downing a compose will not even when the underlying containers have crashed
          docker compose down

      # steps below are related to prover
      - name: Start Ethereum simulation with Anvil
        run: |
          # first install it
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

          ~/.foundry/bin/anvil --block-time 6 --host 0.0.0.0 &
          .github/wait-for-ethereum.sh 'http://127.0.0.1:8545'

      - name: Start prover via compose
        run: |
          docker compose -f docker-compose.prover-testing up -d

      - name: Sanity check for prover
        run: |
          sleep 60
          # TODO

      - name: Collect compose logs
        if: always()
        run: |
          docker compose -f docker-compose.prover-testing logs --no-color > docker-compose-prover-testing.log

      - name: Kill prover container and local Creditcoin node
        run: |
          # note: killall will report failure if process had crashed
          sudo killall -9 prover
          sudo killall -9 creditcoin3-node

          # while downing a compose will not even when the underlying containers have crashed
          docker compose -f docker-compose.prover-testing down

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: docker-logs
          path: docker-*.log

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  git-sanity:
    # note: github.{base_ref|head_ref} only available on pull requests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # checks out the branch of the PR, not in a detached state,
          ref: ${{ github.head_ref }}
          lfs: true

      - name: Setup
        run: |
          # checks out the base branch so it is a known reference
          git checkout "$GITHUB_BASE_REF"

          # switch back to the branch of the PR
          git checkout "$GITHUB_HEAD_REF"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install -g yarn

      - name: Check for Merge commit(s)
        run: |
          commits=$(git log "$GITHUB_BASE_REF".."$GITHUB_HEAD_REF" | grep "Merge: " || echo -n)
          if [ -n "$commits" ]; then
              echo "FAIL: found Merge: commit(s)"
              exit 1
          fi

      - name: Check for duplicate files
        run: |
          .github/check-for-duplicate-files.sh

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Install openzeppelin dependencies
        working-directory: ./common/eth/contracts/
        run: |
          npm install

      - name: Compile Hardhat contract(s)
        working-directory: ./docs/smart-contract-development/with-hardhat
        run: |
          npm install
          npx hardhat compile

      - name: Check for broken symlinks
        run: |
          .github/check-for-broken-symlinks.sh

      - name: Install commitlint and conventional-changelog
        run: yarn install

      - name: Check PR title
        if: always()
        # https://docs.github.com/en/actions/reference/security/secure-use#good-practices-for-mitigating-script-injection-attacks
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | yarn commitlint --verbose; then
            echo "::error title=Malformed PR::PR title must follow conventional commit conventions: https://www.conventionalcommits.org/en/v1.0.0/"
            exit 1
          fi

      - name: Check commit messages
        if: always()
        shell: bash
        run: |
          has_valid=false
          commits="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

          for commit in $(git rev-list "$commits"); do
            if git log -1 --format=%B "$commit" | yarn commitlint --verbose; then
              has_valid=true
              break
            fi
          done

          if [ "$has_valid" = true ]; then
            echo "Found valid commit"
            exit 0
          else
            echo "::error title=No valid commit found::At least one commit message in the PR must follow the conventionnal commits style: https://www.conventionalcommits.org/en/v1.0.0/"
            exit 1
          fi

      - name: Check Changelog
        if: always()
        run: |
          yarn conventional-changelog -p conventionalcommits -r 1 -u -o /var/tmp/changelog.md

          echo "===== DEBUG ====="
          cat /var/tmp/changelog.md
          echo "===== END ====="

  git-rebase-sanity-check:
    runs-on: ubuntu-24.04
    if: github.base_ref == 'dev' || github.base_ref == 'poc_external_attestation_network'
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          lfs: true
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get install colordiff
          echo "BRANCH_NAME=rebase-dev+pr-${{ github.event.pull_request.number }}-onto-testnet" >> "$GITHUB_ENV"

      - name: Rebase current PR against `testnet` branch
        run: |
          git config --global user.email "creditcoin@gluwa.com"
          git config --global user.name "gluwa-bot"

          git checkout -b "${{ env.BRANCH_NAME }}"
          git branch
          git rebase "origin/testnet"

      - name: TODO
        if: always()
        run: |
          # note: GitHub appears to display these in reverse order
          echo "::notice::May also require reverting gluwa-bot commits on the default branch too!"
          echo "::notice::IMPORTANT:  Do this ASAP to prevent further branch divergence in the future."
          echo "::notice::SUGGESTION: Revert conflicting commit(s) on 'testnet' branch and/or merge default into 'testnet'."

      - name: DEBUG
        if: always()
        run: |
          cat .git/rebase-merge/git-rebase-todo.backup || echo
          git status
          git branch
          git diff --diff-filter=U | colordiff

          echo "Most Recent Common Ancestor"
          git merge-base "${{ env.BRANCH_NAME }}" origin/testnet --all

  git-merge-sanity-check:
    runs-on: ubuntu-24.04
    if: github.base_ref == 'dev' || github.base_ref == 'poc_external_attestation_network'
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          lfs: true
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get install colordiff

      - name: Merge current PR into `testnet` branch
        env:
          BRANCH_NAME: merge+pr-${{ github.event.pull_request.number }}-into-testnet
        run: |
          git config --global user.email "creditcoin@gluwa.com"
          git config --global user.name "gluwa-bot"

          # make a branch first b/c we need it
          git checkout -b "${{ env.BRANCH_NAME }}"
          git branch

          # then switch to testnet branch and merge the incoming changes
          git checkout -b testnet "origin/testnet"
          git merge "${{ env.BRANCH_NAME }}"

      - name: TODO
        if: always()
        run: |
          # note: GitHub appears to display these in reverse order
          echo "::notice::May also require reverting gluwa-bot commits on the default branch too!"
          echo "::notice::IMPORTANT:  Do this ASAP to prevent further branch divergence in the future."
          echo "::notice::SUGGESTION: Revert conflicting commit(s) on 'testnet' branch and/or merge default into 'testnet'."

      - name: DEBUG
        if: always()
        run: |
          echo "INFO: Number of conflicts found"
          grep "<<< HEAD" ./* -R | wc -l

          echo "INFO: git status"
          git status
          git branch
          git diff --diff-filter=U | colordiff

  sanity-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Check JSON files
        run: |
          .github/check-json.sh

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Lint Grafana model files
        run: |
          go install github.com/grafana/dashboard-linter@latest

          # rules at https://github.com/grafana/dashboard-linter/blob/main/docs/index.md
          dashboard-linter lint --strict client/attestor-gossip/grafana_model.json

      - name: Check for parity between extrinsics, benchmarks and weights
        run: |
          echo "INFO: active pallets are"
          ./.github/check-parity-bw-extrinsics-benchmarks-weights.sh --show-pallets
          echo "========================"
          ./.github/check-parity-bw-extrinsics-benchmarks-weights.sh

      - name: Check migrations
        run: |
          ./.github/check-usage-of-log-warn.sh

      - name: Check if Cargo.toml specifies dependencies from forks
        run: |
          ./.github/check-for-used-forks.sh

      - name: Check if all Cargo.toml files are specified inside Dependabot config
        run: |
          .github/check-for-missing-Cargo-toml-in-Dependabot-config.sh

      - name: Check if all package.json files are specified inside Dependabot config
        run: |
          .github/check-for-missing-package-json-in-Dependabot-config.sh

      - name: Check if chainspecs are valid and not contain bootnodes
        run: |
          ./.github/check-bootnodes.sh

  sanity-test-cairo:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
      - run: pip install -r prover/requirements.txt

      - name: Compile all Cairo programs available in source code
        run: |
          # shellcheck disable=SC2044,SC2086
          for PROGRAM in $(find . -name "*.cairo"); do
              echo "INFO: will cairo-compile $PROGRAM ..."
              cairo-compile $PROGRAM --proof_mode 2>&1;
          done

  sanity-test-stone-binaries:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
      - run: pip install -r prover/requirements.txt

      - name: setup Cairo program used for testing
        working-directory: ./cairo/testing/
        run: |
          # compile the Cairo program
          cairo-compile fibonacci.cairo --output fibonacci_compiled.json --proof_mode

          # Run the compiled program to generate the prover input files:
          cairo-run \
            --program=fibonacci_compiled.json \
            --layout=small \
            --program_input=fibonacci_input.json \
            --air_public_input=fibonacci_public_input.json \
            --air_private_input=fibonacci_private_input.json \
            --trace_file=fibonacci_trace.bin \
            --memory_file=fibonacci_memory.bin \
            --print_output \
            --proof_mode

      - name: Execute stone prover binary
        working-directory: ./cairo/testing/
        run: |
          ../stone-prover/cpu_air_prover \
            --out_file=fibonacci_proof.json \
            --private_input_file=fibonacci_private_input.json \
            --public_input_file=fibonacci_public_input.json \
            --prover_config_file=cpu_air_prover_config.json \
            --parameter_file=cpu_air_params.json

      - name: Execute stone verifier binary
        working-directory: ./cairo/testing/
        run: |
          ../stone-verifier/cpu_air_verifier --in_file=fibonacci_proof.json

  sanity-test-npm-packages:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install -g yarn

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Install openzeppelin dependencies
        working-directory: ./common/eth/contracts/
        run: |
          npm install

      - name: Compile Hardhat contract(s)
        working-directory: ./docs/smart-contract-development/with-hardhat
        run: |
          npm install
          npx hardhat compile

      - name: Build and install creditcoin-cli
        working-directory: ./cli
        run: |
          yarn install
          yarn build
          npm install -g .

      - name: Execute creditcoin cli command
        run: |
          # this makes sure we have a `creditcoin` entrypoint in the standard PATH
          which creditcoin
          creditcoin help
          creditcoin wizard --help
          creditcoin attestor --help

      - name: Build @gluwa/creditcoin-public-prover package
        working-directory: common/eth/contracts/
        run: |
          npm install
          npm pack

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: binary-for-npm-creditcoin-public-prover
          path: "common/eth/contracts/gluwa-creditcoin-public-prover-*.tgz"
          if-no-files-found: error

  sanity-test-solidity:
    runs-on: ubuntu-24.04
    needs:
      - build-creditcoin-node-for-testing-ci
    # checkov:skip=CKV2_GHA_1:We need this for .bytecode.hash auto-commit
    permissions: write-all
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate precompiles ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Upload generated precompiles ABI
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: precompiles-abi
          path: precompiles/metadata/abi/*.json

      - name: Prepare ENV for Devnet
        id: devnet-env
        if: github.base_ref == 'dev' || github.base_ref == 'poc_external_attestation_network'
        run: |
          echo "target_chain=devnet" >> "$GITHUB_OUTPUT"
          RELEASE_TAG=$(.github/extract-release-tag.sh "devnet")
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare ENV for Testnet
        id: testnet-env
        if: github.base_ref == 'testnet'
        run: |
          echo "target_chain=testnet" >> "$GITHUB_OUTPUT"
          RELEASE_TAG=$(.github/extract-release-tag.sh "testnet")
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare ENV for Mainnnet
        id: mainnet-env
        if: github.base_ref == 'main'
        run: |
          echo "target_chain=mainnet" >> "$GITHUB_OUTPUT"
          RELEASE_TAG=$(.github/extract-release-tag.sh "mainnet")
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check precompiles
        run: |
          sudo apt-get install colordiff

          export TARGET_CHAIN="${{ steps.devnet-env.outputs.target_chain || steps.testnet-env.outputs.target_chain || steps.mainnet-env.outputs.target_chain }}"
          .github/check-solidity-source-vs-metadata.sh

      - name: Install openzeppelin dependencies
        working-directory: ./common/eth/contracts/
        run: |
          npm install

      - name: Rebuild ABI for Prover.sol
        working-directory: ./common/eth/contracts/
        run: |
          ./build.sh

      - name: Check if prover.json is in sync with Prover.sol
        working-directory: ./common/eth/contracts/
        run: |
          echo "========== DEBUG DEBUG DEBUG =========="
          git status --short --untracked-files=no
          git diff
          echo "======================================="

          # shellcheck disable=SC2143
          if [ -n "$(git status --short --untracked-files=no)" ]; then
              echo "FAIL: changes detected. prover.json NOT in sync with Prover.sol, see above."
              exit 1
          else
              echo "PASS: No changes detected. All good."
              exit 0
          fi

      - name: Execute Solidity linters
        working-directory: ./common/eth/contracts/
        run: |
          npm run solhint

      - name: Download creditcoin-node binary
        uses: actions/download-artifact@v6
        with:
          name: binary-for-testing-ci
          path: target/release

      - name: Update Prover.sol bytecode.hash if changed
        id: bytecode_hash
        run: |
          chmod a+x ./target/release/compute-prover-contract-bytecode-hash
          ./target/release/compute-prover-contract-bytecode-hash > common/eth/contracts/.bytecode.hash

          if [ -n "$(git status --short --untracked-files=no -- common/eth/contracts/)" ]; then
              git diff common/eth/contracts/
              echo "git_diff=true" >> "$GITHUB_OUTPUT"
          else
              echo "git_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes for bytecode.hash
        if: ${{ env.GITHUB_TOKEN && success() && steps.bytecode_hash.outputs.git_diff == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: EndBug/add-and-commit@v9
        with:
          add: "common/eth/contracts/.bytecode.hash"
          author_name: gluwa-bot
          author_email: creditcoin@gluwa.com
          message: "docs(Prover.sol): update bytecode hash\n
                    \n
                    BREAKING CHANGE: contract changed. Redeployment required!"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find latest release
        id: find-latest
        run: |
          # shellcheck disable=SC2129
          echo "release_tag=${{ steps.devnet-env.outputs.release_tag || steps.testnet-env.outputs.release_tag || steps.mainnet-env.outputs.release_tag }}" >> "$GITHUB_OUTPUT"

      - name: Download smart-contract artifact(s) for release ${{ steps.find-latest.outputs.release_tag }}
        uses: i3h/download-release-asset@v1
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          tag: ${{ steps.find-latest.outputs.release_tag }}
          file: /(.*)\.sol/
          path: common/eth/contracts/sol/
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare current Prover.sol with latest released artifact(s)
        working-directory: ./common/eth/contracts/sol/
        run: |
          echo "========== DEBUG DEBUG DEBUG =========="
          git status --short --untracked-files=no
          git diff -R | colordiff
          echo "======================================="

          # shellcheck disable=SC2143
          if [ -n "$(git status --short --untracked-files=no)" ]; then
              echo "FAIL: Current Prover.sol differs from Prover.sol in latest release"
              echo "INFO: changes to Prover.sol require contract(s) to be redeployed"
              echo "WARN: when updating prover(s) don't forget to redeploy this contract"
              exit 1
          else
              echo "PASS: No changes detected. All good."
              exit 0
          fi

  fmt:
    name: Rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        uses: gluwa/cargo@dev
        with:
          command: fmt
          args: -- --check

      - name: Check TOML formatting
        run: |
          cargo install taplo-cli --locked
          taplo format --check

  clippy:
    name: Clippy
    needs:
      - deploy-runner-clippy
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-clippy"]
    steps:
      - uses: actions/checkout@v5

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          targets: wasm32-unknown-unknown
          components: clippy, rust-src
      - uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        uses: gluwa/cargo@dev
        with:
          command: clippy
          args: --all-targets --all-features -- -D warnings

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  check:
    needs:
      - deploy-runner-check
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-check"]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Check featalign
        # see https://gluwa.atlassian.net/browse/CSUB-1388
        if: false
        run: |
          cargo install cargo-featalign

          # produces a human readable output
          cargo featalign runtime --features std,runtime-benchmarks,fast-runtime,devnet --workspace-only --default-std --depth -1 --mode check | jq

          # exit with non-zero on error
          cargo featalign runtime --features std,runtime-benchmarks,fast-runtime,devnet --workspace-only --default-std --depth -1 --mode check

      - name: Check Build
        run: |
          SKIP_WASM_BUILD=1 cargo check --release

      - name: Check Build for Benchmarking
        run: |
          SKIP_WASM_BUILD=1 cargo check --features=runtime-benchmarks --release

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  unit-test-creditcoin:
    needs:
      - deploy-runner-unit-test-creditcoin
    runs-on:
      [
        self-hosted,
        "workflow-${{ github.run_id }}",
        "proxy-unit-test-creditcoin",
      ]
    steps:
      - uses: actions/checkout@v5

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          components: llvm-tools-preview, rust-src
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.62.43
        with:
          tool: cargo-llvm-cov

      - name: Run tests
        run: |
          # configure the path so we can discover external binaries
          PROVER_PATH=$(readlink -f ./cairo/stone-prover)
          SCRIPTS_PATH=$(readlink -f ./cairo/scripts)
          VERIFIER_PATH=$(readlink -f ./cairo/stone-verifier)
          export PATH="$PATH:$PROVER_PATH:$SCRIPTS_PATH:$VERIFIER_PATH"

          cargo llvm-cov \
              --release \
              --workspace --html --show-missing-lines --hide-instantiations \
              --ignore-filename-regex "(benchmarking.rs|mock.rs|tests.rs|weights.rs)"

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: target/llvm-cov/html/

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  deploy-runner-build-creditcoin-for:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: build-creditcoin-node-for-devnet
          - proxy: build-creditcoin-node-for-testnet

    name: deploy-runner / proxy=${{ matrix.proxy }} / / type=
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # See https://github.com/actions/runner/issues/1879#issuecomment-1123196869
      - name: Create matrix.txt
        run: |
          echo "proxy=${{ matrix.proxy }} /  / type=" > matrix.txt

      - name: Evaluate env vars
        id: get-env
        run: |
          HASH_VALUE=$(echo "${{ hashFiles('matrix.txt') }}" | cut -c1-7)
          rm matrix.txt

          # WARNING: using env.RUNNER_VM_NAME directly in job outputs above
          # doesn't evaluate the $GITHUB_RUN_ID reference
          echo "runner_vm_name=${{ env.RUNNER_VM_NAME }}-$HASH_VALUE" >> "$GITHUB_OUTPUT"

      - name: Provision VM
        if: env.LC_GITHUB_REPO_ADMIN_TOKEN
        run: |
          .github/provision-linode-vm.sh
        env:
          LC_OWNER_REPO_SLUG: ${{ github.repository }}
          LC_GITHUB_REPO_ADMIN_TOKEN: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
          LC_RUNNER_VM_NAME: ${{ steps.get-env.outputs.runner_vm_name }}
          LC_PROXY_ENABLED: ${{ matrix.proxy }}
          LC_WORKFLOW_ID: ${{ github.run_id }}
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_CLI_TOKEN }}

      - name: Upload Linode logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: linode-${{ matrix.proxy }}-logs
          path: retry*.json

