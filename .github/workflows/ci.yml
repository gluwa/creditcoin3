---
name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [main, testnet, dev]
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: read-all

env:
  RUNNER_VM_NAME: "gh-runner-$GITHUB_RUN_ID-attempt-$GITHUB_RUN_ATTEMPT"
  LINODE_REGION: "nl-ams"
  # Shared CPU, Linode 8 GB, 4 vCPU, 96 $/mo
  LINODE_VM_SIZE: "g6-standard-4"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  docker-build:
    runs-on: [self-hosted, "workflow-${{ github.run_id }}", "proxy-docker-build"]
    steps:
      - uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -t ${{ github.repository }} .

      - name: Start a container from image
        run: |
          # see https://opensource.com/article/18/5/how-find-ip-address-linux
          IP_ADDRESS=$(curl https://ifconfig.me)
          echo "INFO: IP_ADDRESS=$IP_ADDRESS"

          docker run --rm --name creditcoin-validator -d -p 9944:9944 -p 30333:30333 ${{ github.repository }} \
              --validator --chain testnet                                   \
              --name "test-node-$GITHUB_RUN_ID-attempt-$GITHUB_RUN_ATTEMPT" \
              --public-addr "/dns4/$IP_ADDRESS/tcp/30333" \
              --prometheus-external \
              --telemetry-url "wss://telemetry.polkadot.io/submit/ 0" \
              --telemetry-url "wss://telemetry.creditcoin.network/submit/ 0" \
              --bootnodes "/dns4/cc3-test-bootnode.creditcoin.network/tcp/30333/p2p/12D3KooWAxmsWr6iEjFyLqQBzfLvbCRTAhYBeszyr8UWgQx6Zu7K" \
              --port 30333 --unsafe-rpc-external

      - name: Healtcheck
        run: |
          sleep 60
          .github/check-health.sh

      - name: Sanity test creditcoin-cli inside the container
        run: |
          docker exec creditcoin-validator which creditcoin
          docker exec creditcoin-validator creditcoin wizard --help

      - name: Sanity check for chainspecs inside the container
        run: |
          for f in chainspecs/*.json; do
              spec=$(basename "$f")
              docker exec creditcoin-validator  ls -l "/$spec"
          done

      - name: Sanity check other binaries inside the container
        run: |
          docker exec creditcoin-validator which attestor
          docker exec creditcoin-validator attestor --help

          docker exec creditcoin-validator which attestor_zombienet
          docker exec creditcoin-validator attestor_zombienet --help

          docker exec creditcoin-validator which query-cli
          docker exec creditcoin-validator query-cli --help

          docker exec creditcoin-validator which prover
          docker exec creditcoin-validator prover --help

      - name: Sanity check Cairo components inside the container
        run: |
          docker exec creditcoin-validator which cairo-compile
          docker exec creditcoin-validator cairo-compile --help

          docker exec creditcoin-validator which cairo-run
          docker exec creditcoin-validator cairo-run --help

          docker exec creditcoin-validator which cpu_air_prover
          docker exec creditcoin-validator cpu_air_prover --help

          docker exec creditcoin-validator which cpu_air_verifier
          docker exec creditcoin-validator cpu_air_verifier --help

      - name: Collect docker logs
        if: always()
        run: |
          docker logs creditcoin-validator >docker-creditcoin-validator.log 2>&1

      - name: Kill the container
        run: |
          sudo killall -9 creditcoin3-node
          sleep 10
          docker rm -f creditcoin-validator
          sleep 10

      - name: Start container via compose
        run: |
          docker compose up -d

      - name: Sanity check for persistently mounted directory
        run: |
          sleep 60
          docker exec creditcoin-validator ls -ld /creditcoin-node/data
          docker exec creditcoin-validator ls -la /creditcoin-node/data

      - name: Collect compose logs
        if: always()
        run: |
          docker compose logs --no-color > docker-compose.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-*.log

      - name: Kill the container
        run: |
          sudo killall -9 creditcoin3-node

      # keep this always as the last step
      - name: Schedule self-hosted shutdown
        if: always()
        run: |
          # unreliable
          sudo nohup shutdown +10 1>/dev/null 2>/dev/null & disown

  git-sanity:
    # note: github.{base_ref|head_ref} only available on pull requests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # checks out the branch of the PR, not in a detached state,
          ref: ${{ github.head_ref }}
          lfs: true

      - name: Setup
        run: |
          # checks out the base branch so it is a known reference
          git checkout "$GITHUB_BASE_REF"

          # switch back to the branch of the PR
          git checkout "$GITHUB_HEAD_REF"

      - name: Check for Merge commit(s)
        run: |
          commits=$(git log "$GITHUB_BASE_REF".."$GITHUB_HEAD_REF" | grep "Merge: " || echo -n)
          if [ -n "$commits" ]; then
              echo "FAIL: found Merge: commit(s)"
              exit 1
          fi

  sanity-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check for parity between extrinsics, benchmarks and weights
        run: |
          echo "INFO: active pallets are"
          ./.github/check-parity-bw-extrinsics-benchmarks-weights.sh --show-pallets
          echo "========================"
          ./.github/check-parity-bw-extrinsics-benchmarks-weights.sh

      - name: Check migrations
        run: |
          ./.github/check-usage-of-log-warn.sh

#      - name: Check if Cargo.toml specifies dependencies from forks
#        run: |
#          ./.github/check-for-used-forks.sh
#
      - name: Check if all Cargo.toml files are specified inside Dependabot config
        run: |
          .github/check-for-missing-Cargo-toml-in-Dependabot-config.sh

      - name: Check if all package.json files are specified inside Dependabot config
        run: |
          .github/check-for-missing-package-json-in-Dependabot-config.sh

      - name: Check if chainspecs are valid and not contain bootnodes
        run: |
          ./.github/check-bootnodes.sh

  sanity-test-stone-binaries:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r prover/requirements.txt

      - name: setup Cairo program used for testing
        working-directory: ./cairo/testing/
        run: |
          # compile the Cairo program
          cairo-compile fibonacci.cairo --output fibonacci_compiled.json --proof_mode

          # Run the compiled program to generate the prover input files:
          cairo-run \
            --program=fibonacci_compiled.json \
            --layout=small \
            --program_input=fibonacci_input.json \
            --air_public_input=fibonacci_public_input.json \
            --air_private_input=fibonacci_private_input.json \
            --trace_file=fibonacci_trace.bin \
            --memory_file=fibonacci_memory.bin \
            --print_output \
            --proof_mode

      - name: Execute stone prover binary
        working-directory: ./cairo/testing/
        run: |
          ../stone-prover/cpu_air_prover \
            --out_file=fibonacci_proof.json \
            --private_input_file=fibonacci_private_input.json \
            --public_input_file=fibonacci_public_input.json \
            --prover_config_file=cpu_air_prover_config.json \
            --parameter_file=cpu_air_params.json

      - name: Execute stone verifier binary
        working-directory: ./cairo/testing/
        run: |
          ../stone-verifier/cpu_air_verifier --in_file=fibonacci_proof.json

