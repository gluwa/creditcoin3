---
name: proof-gen-api-server

"on":
  pull_request:
    branches: [main, usc-testnet, usc-dev]
    paths:
      - "proof-gen-api-server/**"
      - "scripts/**"
      - ".github/workflows/proof-gen-api-server.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: read-all

jobs:
  integration-tests:
    needs:
      - deploy-runner-proof-gen-api-server-integration-tests
    runs-on:
      [
        self-hosted,
        "workflow-${{ github.run_id }}",
        "proxy-proof-gen-api-server-integration-tests",
      ]
    steps:
      - uses: actions/checkout@v6

      - name: Install Anvil
        run: |
          # first install it
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

          ANVIL_BIN=$(readlink -f ~/.foundry/bin/anvil)
          echo "ANVIL_BIN=$ANVIL_BIN" >> "$GITHUB_ENV"

          CAST_BIN=$(readlink -f ~/.foundry/bin/cast)
          echo "CAST_BIN=$CAST_BIN" >> "$GITHUB_ENV"

          echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview, rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.71.2
        with:
          tool: cargo-llvm-cov@0.6.24

      - name: Run tests
        run: |
          cargo llvm-cov \
              --release \
              --package proof-gen-api-server --features integration-tests  \
              --html --show-missing-lines --hide-instantiations \
              --ignore-filename-regex "(tests(.*).rs)"
        env:
          ANVIL_BIN: ${{ env.ANVIL_BIN }}
          CAST_BIN: ${{ env.CAST_BIN }}

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/llvm-cov/html/

  deploy-runner-proof-gen-api-server-integration-tests:
    uses: ./.github/workflows/deploy-runner.yml
    with:
      RUNNER_VM_NAME: "${{ github.event.repository.name }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}"
      LINODE_REGION: "nl-ams"
      LINODE_VM_SIZE: "g6-standard-4"
      proxy: "proof-gen-api-server-integration-tests"
    secrets: inherit

  rm-gh-runner-proof-gen-api-server-integration-tests:
    needs:
      - integration-tests
    if: ${{ always() }}
    uses: ./.github/workflows/remove-runner.yml
    with:
      RUNNER_VM_NAME: "${{ github.event.repository.name }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}"
      proxy: "proof-gen-api-server-integration-tests"
    secrets: inherit

  deploy-runner-build-proof-gen:
    uses: ./.github/workflows/deploy-runner.yml
    with:
      RUNNER_VM_NAME: "${{ github.event.repository.name }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}"
      LINODE_REGION: "nl-ams"
      LINODE_VM_SIZE: "g6-standard-4"
      proxy: "build-proof-gen"
    secrets: inherit

  rm-gh-runner-build-proof-gen:
    needs:
      - build-everything
    if: ${{ always() }}
    uses: ./.github/workflows/remove-runner.yml
    with:
      RUNNER_VM_NAME: "${{ github.event.repository.name }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}"
      proxy: "build-proof-gen"
    secrets: inherit

  build-everything:
    needs:
      - deploy-runner-build-proof-gen
    uses: ./.github/workflows/build-native.yml
    with:
      build-options: "--release --features=fast-runtime"
      version-string: testing-proof-gen
      runs-on: "['self-hosted', 'workflow-${{ github.run_id }}', 'proxy-build-proof-gen']"
    secrets: inherit

  deploy-runner-submit-proof:
    needs:
      - build-everything
    uses: ./.github/workflows/deploy-runner.yml
    with:
      RUNNER_VM_NAME: "${{ github.event.repository.name }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}"
      LINODE_REGION: "nl-ams"
      LINODE_VM_SIZE: "g6-standard-4"
      proxy: "submit-proof"
    secrets: inherit

  rm-gh-runner-submit-proof:
    needs:
      - exercise-scripts
    if: ${{ always() }}
    uses: ./.github/workflows/remove-runner.yml
    with:
      RUNNER_VM_NAME: "${{ github.event.repository.name }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}"
      proxy: "submit-proof"
    secrets: inherit

  exercise-scripts:
    needs:
      - deploy-runner-submit-proof
    runs-on:
      [self-hosted, "workflow-${{ github.run_id }}", "proxy-submit-proof"]
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: binary-for-testing-proof-gen
          path: target/release

      - name: Start creditcoin3-node - Alice
        run: |
          mkdir -p /var/tmp/exercise-scripts/
          chmod a+x ./target/release/creditcoin3-node

          ./target/release/creditcoin3-node \
            --chain dev \
            --validator --alice  --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --base-path ./alice-data >/var/tmp/exercise-scripts/creditcoin3-node-alice.log 2>&1 &

      - name: Start Ethereum simulation with Anvil
        run: |
          # first install it
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

          # supported chain keys are hard-coded in attestor/src/cc3.rs and node/src/chain_spec.rs
          # Anvil1 == chain_key(2), Anvil2 == chain_key(4). Ports are arbitrary
          ~/.foundry/bin/anvil --block-time 6 --chain-id 31337 --port 8141 &
          ~/.foundry/bin/anvil --block-time 6 --chain-id 31338 --port 8142 &

      - name: Check that creditcoin-node and anvil are running
        run: |
          .github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'
          .github/wait-for-ethereum.sh 'http://127.0.0.1:8141'
          .github/wait-for-ethereum.sh 'http://127.0.0.1:8142'

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Simulate a native token transfer on Anvil 1
        id: native-transfer-anvil-1
        working-directory: attestor/scripts
        run: |
          npm install

          OUTPUT=$(ETH_RPC_URL=http://127.0.0.1:8141 node Transfer.js)
          echo "$OUTPUT"

          TXN_HASH=$(echo "$OUTPUT" | grep hash: | cut -f2 -d: | tr -d ' ')

          # Provide default values if extraction failed
          if [ -z "$TXN_HASH" ]; then
            echo "ERROR: Could not extract transaction hash from Transfer.js output"
            exit 2
          fi

          echo "txn_hash=$TXN_HASH" >> "$GITHUB_OUTPUT"

      - name: Simulate a second native token transfer on Anvil 1
        id: native-transfer-anvil-2
        working-directory: attestor/scripts
        run: |
          npm install

          OUTPUT=$(ETH_RPC_URL=http://127.0.0.1:8141 node Transfer.js)
          echo "$OUTPUT"

          TXN_HASH=$(echo "$OUTPUT" | grep hash: | cut -f2 -d: | tr -d ' ')

          # Provide default values if extraction failed
          if [ -z "$TXN_HASH" ]; then
            echo "ERROR: Could not extract transaction hash from Transfer.js output"
            exit 2
          fi

          echo "txn_hash=$TXN_HASH" >> "$GITHUB_OUTPUT"

      - name: Start Attestation Zombienet (chain 2 — Anvil 1)
        run: |
          chmod a+x ./target/release/attestor*

          ./target/release/attestor_zombienet \
                -n 3 \
                --chain-key=2 \
                --bin=./target/release/attestor \
                --eth-url=ws://localhost:8141 \
                --cc3-url=ws://localhost:9944 \
                --funding-address='//Alice' \
                --config=./attestor/config.yaml \
                >/var/tmp/exercise-scripts/zombienet-chain2.log &

      - name: Wait for chain 2 attestors to be registered
        run: |
          .github/wait-for-attestors.sh 'http://127.0.0.1:9944' 2

      # Chain 4 zombienet starts AFTER chain 2 attestors are registered to
      # avoid nonce collisions when both use the same funding account (//Alice).
      # --offset=3 gives chain 4 attestors unique keypairs so they don't share
      # account nonces with chain 2 attestors (which would cause tx failures).
      - name: Start Attestation Zombienet (chain 4 — Anvil 2)
        run: |
          ./target/release/attestor_zombienet \
                -n 3 \
                --offset=3 \
                --chain-key=4 \
                --bin=./target/release/attestor \
                --eth-url=ws://localhost:8142 \
                --cc3-url=ws://localhost:9944 \
                --funding-address='//Alice' \
                --config=./attestor/config.yaml \
                --p2p-port-base=9010 \
                --api-port-base=9110 \
                >/var/tmp/exercise-scripts/zombienet-chain4.log &

      - name: Wait for chain 4 attestors to be registered
        run: |
          .github/wait-for-attestors.sh 'http://127.0.0.1:9944' 4

      - name: Wait for chain 2 transfer and attestation events
        working-directory: scripts
        run: |
          npm install
          node TransferAndWait.js --chain-key 2 \
            --source-rpc-url http://127.0.0.1:8141 \
            --cc3-rpc-url ws://localhost:9944

      - name: Wait for chain 4 transfer and attestation events
        working-directory: scripts
        run: |
          node TransferAndWait.js --chain-key 4 \
            --source-rpc-url http://127.0.0.1:8142 \
            --cc3-rpc-url ws://localhost:9944

      - name: Start Redis
        working-directory: proof-gen-api-server
        run: |
          docker compose pull
          docker compose up -d
          sleep 60

      - name: Start proof-gen-api-server (multi-chain via YAML config)
        run: |
          chmod a+x ./target/release/proof-gen-api-server

          ./target/release/proof-gen-api-server \
            --cc3-key "//Alice" \
            --cc3-rpc-url ws://localhost:9944 \
            --config proof-gen-api-server/config.ci.yaml \
            >/var/tmp/exercise-scripts/proof-gen-api-server.log &

          sleep 30

      - name: Exercise TransferWaitAndSubmit.js
        working-directory: scripts
        run: |
          npm install

          # Using Anvil Account #0 on source chain & Alith on execution chain
          node TransferWaitAndSubmit.js \
            --source-rpc-url http://127.0.0.1:8141 \
            --cc3-rpc-url ws://localhost:9944 \
            --cc3-private-key 0x5fb92d6e98884f76de468fa3f6278f8807c48bebc13595d45af5bdc4da702133 \
            --api-url http://localhost:3100

      - name: Collect logs
        if: always()
        working-directory: proof-gen-api-server
        run: |
          docker compose logs --no-color > /var/tmp/exercise-scripts/redis.log

      - name: Simulate Redis going down
        working-directory: proof-gen-api-server
        run: |
          docker compose down
          sleep 30

      - name: Exercise TransferWaitAndSubmit.js
        working-directory: scripts
        run: |
          # Using Anvil Account #0 on source chain & Alith on execution chain
          node TransferWaitAndSubmit.js \
            --source-rpc-url http://127.0.0.1:8141 \
            --cc3-rpc-url ws://localhost:9944 \
            --cc3-private-key 0x5fb92d6e98884f76de468fa3f6278f8807c48bebc13595d45af5bdc4da702133 \
            --api-url http://localhost:3100

      - name: Restart Redis
        working-directory: proof-gen-api-server
        run: |
          docker compose up -d
          sleep 30

      - name: Exercise TransferWaitAndSubmit.js
        working-directory: scripts
        run: |
          # Using Anvil Account #0 on source chain & Alith on execution chain
          node TransferWaitAndSubmit.js \
            --source-rpc-url http://127.0.0.1:8141 \
            --cc3-rpc-url ws://localhost:9944 \
            --cc3-private-key 0x5fb92d6e98884f76de468fa3f6278f8807c48bebc13595d45af5bdc4da702133 \
            --api-url http://localhost:3100

      - name: Exercise SubmitProof.js
        working-directory: scripts
        run: |
          # Using Alith on execution chain
          node SubmitProof.js 2 ${{ steps.native-transfer-anvil-1.outputs.txn_hash }} \
            --private-key 0x5fb92d6e98884f76de468fa3f6278f8807c48bebc13595d45af5bdc4da702133 \
            --api-url http://localhost:3100 \
            --cc3-rpc-url http://localhost:9944 \
            --verbose

      - name: Exercise SubmitBatchProof.js
        working-directory: scripts
        run: |
          # Using Alith on execution chain
          node SubmitBatchProof.js 2 --hashes \
            ${{ steps.native-transfer-anvil-1.outputs.txn_hash }},${{ steps.native-transfer-anvil-2.outputs.txn_hash }} \
            --private-key 0x5fb92d6e98884f76de468fa3f6278f8807c48bebc13595d45af5bdc4da702133 \
            --api-url http://localhost:3100 \
            --cc3-rpc-url http://localhost:9944 \
            --verbose

      - name: Exercise TransferWaitAndSubmit.js against Anvil 2 (chain 4)
        working-directory: scripts
        run: |
          node TransferWaitAndSubmit.js \
            --chain-key 4 \
            --source-rpc-url http://127.0.0.1:8142 \
            --cc3-rpc-url ws://localhost:9944 \
            --cc3-private-key 0x5fb92d6e98884f76de468fa3f6278f8807c48bebc13595d45af5bdc4da702133 \
            --api-url http://localhost:3100

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: exercise-scripts-logs
          path: |
            /var/tmp/exercise-scripts/
            ./logs/
          include-hidden-files: true

  # NOTE: not using a self-hosted runner here b/c this job is intended to run
  # in under 10 minutes, probably even 5
  stress-test-sanity:
    needs:
      - build-everything
    runs-on: ubuntu-24.04
    steps:
      # start this early so it has time to produce more blocks to be used by stress-test
      - name: Start Ethereum simulation with Anvil
        run: |
          export FOUNDRY_DIR="$HOME/.foundry"
          # first install it
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

          # supported chain keys are hard-coded in attestor/src/cc3.rs and node/src/chain_spec.rs
          # Anvil1 == chain_key(2), Anvil2 == chain_key(4). Ports are arbitrary
          ~/.foundry/bin/anvil --block-time 6 --chain-id 31337 --port 8141 &

      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Simulate a native token transfer on Anvil 1
        working-directory: attestor/scripts
        run: |
          npm install

          for _i in $(seq 5); do
              ETH_RPC_URL=http://127.0.0.1:8141 node Transfer.js
          done

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: binary-for-testing-proof-gen
          path: target/release

      - name: Start creditcoin3-node - Alice
        run: |
          mkdir -p /var/tmp/stress-test-sanity/
          chmod a+x ./target/release/creditcoin3-node

          ./target/release/creditcoin3-node \
            --chain dev \
            --validator --alice  --pruning archive \
            --node-key d182d503b7dd97e7c055f33438c7717145840fd66b2a055284ee8d768241a463 \
            --base-path ./alice-data >/var/tmp/stress-test-sanity/creditcoin3-node-alice.log 2>&1 &

      - name: Check that creditcoin-node and anvil are running
        run: |
          .github/wait-for-creditcoin.sh 'http://127.0.0.1:9944'
          .github/wait-for-ethereum.sh 'http://127.0.0.1:8141'

      - name: Start Attestation Zombienet
        run: |
          chmod a+x ./target/release/attestor*

          ./target/release/attestor_zombienet \
                -n 3 \
                --chain-key=2 \
                --bin=./target/release/attestor \
                --eth-url=ws://localhost:8141 \
                --cc3-url=ws://localhost:9944 \
                --funding-address='//Alice' \
                --config=./attestor/config.yaml \
                >/var/tmp/stress-test-sanity/zombienet-alice.log &

      - name: Wait for 3 attestors to be registered
        run: |
          # wait for Anvil_1 attestors (chain 2)
          .github/wait-for-attestors.sh 'http://127.0.0.1:9944'

      - name: Wait for attestations
        working-directory: scripts
        run: |
          npm install

          # Uses Anvil Account #0 on source chain
          node TransferAndWait.js \
            --chain-key 2 \
            --source-rpc-url http://127.0.0.1:8141 \
            --cc3-rpc-url ws://localhost:9944

      - name: Start proof-gen-api-server
        run: |
          chmod a+x ./target/release/proof-gen-api-server

          ./target/release/proof-gen-api-server \
            --cc3-key "//Alice" \
            --cc3-rpc-url ws://localhost:9944 \
            --eth-rpc-url http://localhost:8141 \
            >/var/tmp/stress-test-sanity/proof-gen-api-server.log &

          sleep 30

      - name: Extract Deno version from Dockerfile
        id: deno_version
        working-directory: scripts/stress-test/
        run: |
          # Extract version from "FROM denoland/deno:X.Y.Z" line
          VERSION=$(grep "^FROM denoland/deno:" Dockerfile | sed 's/.*denoland\/deno://' | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract Deno version from Dockerfile"
            exit 1
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted Deno version: v${VERSION}"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ steps.deno_version.outputs.version }}

      - name: Start stress-test
        working-directory: scripts/stress-test/
        run: |
          deno task start --mode mixed --api-url http://localhost:3100 \
            --chain-key 2 --source-rpc http://localhost:8141 \
            --mix-ratio 0.5 --rps 10 --duration 60

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stress-test-logs
          path: |
            /var/tmp/stress-test-sanity/
            ./logs/
          include-hidden-files: true
