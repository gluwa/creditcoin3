---
name: Reusable workflow to rebase a branch and propose a PR

"on":
  workflow_call:
    inputs:
      last-ref:
        required: true
        type: string
      target-branch:
        required: true
        type: string

# Security: don't use inputs directly, pass them through ENV, see:
# https://docs.github.com/en/actions/reference/security/secure-use#use-an-intermediate-environment-variable
env:
  LAST_REF: ${{ inputs.last-ref }}
  TARGET_BRANCH: ${{ inputs.target-branch }}

jobs:
  open-new-pr:
    runs-on: ubuntu-24.04
    # checkov:skip=CKV2_GHA_1:We need this for auto-commit
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          token: ${{ secrets.GLUWA_BOT_TOKEN }}
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get install colordiff
          echo "BRANCH_NAME=$(date +%Y-%m-%d)/merge-${{ env.LAST_REF }}-into-${{ env.TARGET_BRANCH }}" >> "$GITHUB_ENV"

      - name: Create ${{ env.BRANCH_NAME }} from ${{ env.LAST_REF }}
        run: |
          git checkout -b "${{ env.BRANCH_NAME }}" "${{ env.LAST_REF }}"
          git branch

      - name: Rebase ${{ env.BRANCH_NAME }} against ${{ env.TARGET_BRANCH }}
        run: |
          git config --global user.email "creditcoin@gluwa.com"
          git config --global user.name "gluwa-bot"

          git rebase "origin/${{ env.TARGET_BRANCH }}"

      - name: DEBUG
        if: always()
        run: |
          cat .git/rebase-merge/git-rebase-todo.backup || echo
          git status
          git branch
          git diff --diff-filter=U | colordiff

          echo "Most Recent Common Ancestor"
          git merge-base "${{ env.BRANCH_NAME }}" "origin/${{ env.TARGET_BRANCH }}" --all

      - name: Push ${{ env.BRANCH_NAME }}
        run: |
          git push origin "${{ env.BRANCH_NAME }}"

      - name: Open PR against ${{ env.TARGET_BRANCH }}
        id: open-pr
        uses: rematocorp/open-pull-request-action@v1
        with:
          github-token: ${{ secrets.GLUWA_BOT_TOKEN }}
          from-branch: ${{ env.BRANCH_NAME }}
          to-branch: ${{ env.TARGET_BRANCH }}
          repository-owner: ${{ github.repository_owner }}
          repository: ${{ github.event.repository.name }}

      - name: Assign PR ${{ steps.open-pr.outputs.pull_number }} to ${{ github.triggering_actor }}
        if: env.ACTOR
        uses: actions/github-script@v8
        env:
          TARGET_PR: ${{ steps.open-pr.outputs.pull_number }}
          ACTOR: ${{ github.triggering_actor }}
          WORKFLOW_URL: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: process.env.TARGET_PR,
              body: `Initiated by ${process.env.WORKFLOW_URL}`
            });

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: process.env.TARGET_PR,
              reviewers: [process.env.ACTOR],
              // WARNING: doesn't work although docs show this as the correct format
              // team_reviewers: ['protocol', 'protocol-manager'],
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.TARGET_PR,
              assignees: [process.env.ACTOR],
            });

      - name: Report result to Slack
        if: always()
        uses: act10ns/slack@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ job.status }}
          channel: "#protocol-internal"
          message: "${{ env.LAST_REF }} -> ${{ env.TARGET_BRANCH }}: https://github.com/gluwa/creditcoin3-next/pull/${{ steps.open-pr.outputs.pull_number }}! Check for results in ~2hrs; cc <@U028EMRHS3S>"
