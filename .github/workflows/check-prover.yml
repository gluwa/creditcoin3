---
name: Check Prover

"on":
  schedule:
    - cron: "0 */12 * * 1-5"
  workflow_dispatch:

permissions: read-all

jobs:
  check-for:
    strategy:
      fail-fast: false
      matrix:
        include:
          # CC3 Testnet, Ethereum Mainnet Full Archive
          - creditcoinUrl: "wss://rpc.cc3-testnet.creditcoin.network/ws"
            proverUrl: "https://prover.cc3-testnet.creditcoin.network"
            indexerUrl: "https://graphql-usc.cc3-testnet.creditcoin.network"
            evmV1Decoder: "0x731c345d79Fb8BbDC541f9DF3b6317585F849F9f"
            chainKey: 3

    name: CK ${{ matrix.chainKey }} / ${{ matrix.proverUrl }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: cli/yarn.lock
      - run: npm install -g yarn

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate precompiles ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Install & build
        working-directory: ./cli
        run: |
          yarn install
          yarn build

      - name: Discover testing ENV
        id: test-env
        run: |
          NAME=$(echo "${{ matrix.creditcoinUrl }}" | sed "s/wss//" | sed "s/ws//" | tr -d "/" | tr -d ":" | sed "s/rpc.//" | sed "s/.creditcoin.network//")
          echo "chain-name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Execute prover-check.ts on random blocks
        working-directory: ./cli
        env:
          LAST_SOURCE_BLOCK: '4370500'
          GO_BACK_BLOCKS: '1000'
          STEP_THROUGH_BLOCKS: '1'
        run: |
          node dist/scripts/prover-check.js \
            ${{ matrix.creditcoinUrl }} ${{ matrix.chainKey }} ${{ matrix.proverUrl }} \
            /var/tmp/${{ steps.test-env.outputs.chain-name }}-ck-${{ matrix.chainKey }} "" ${{ matrix.evmV1Decoder }}

      - name: Upload proofs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: proofs-for-${{ steps.test-env.outputs.chain-name }}-ck-${{ matrix.chainKey }}
          path: /var/tmp/${{ steps.test-env.outputs.chain-name }}-ck-${{ matrix.chainKey }}

      - name: Report result to Slack
        if: always()
        uses: act10ns/slack@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ job.status }}
          inputs: ${{ toJson(matrix) }}
          channel: "#noti-creditcoin-snapshots"
          message: "Checking CK(${{ matrix.chainKey }})@${{ matrix.proverUrl}} complete! cc <@U028EMRHS3S>"
