---
name: git

"on":
  pull_request:
    branches: [main, testnet, poc_external_attestation_network]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: read-all

jobs:
  sanity:
    # note: github.{base_ref|head_ref} only available on pull requests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # checks out the branch of the PR, not in a detached state,
          ref: ${{ github.head_ref }}
          lfs: true

      - name: Setup
        run: |
          # checks out the base branch so it is a known reference
          git checkout "$GITHUB_BASE_REF"

          # switch back to the branch of the PR
          git checkout "$GITHUB_HEAD_REF"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install -g yarn

      - name: Check for Merge commit(s)
        run: |
          commits=$(git log "$GITHUB_BASE_REF".."$GITHUB_HEAD_REF" | grep "Merge: " || echo -n)
          if [ -n "$commits" ]; then
              echo "FAIL: found Merge: commit(s)"
              exit 1
          fi

      - name: Check for duplicate files
        run: |
          .github/check-for-duplicate-files.sh

      - name: Install Solidity compiler
        run: |
          sudo .github/install-solidity-compiler.sh

      - name: Generate ABI from source code
        working-directory: ./precompiles/metadata
        run: |
          solc --version
          ./abi-creator.sh

      - name: Check for broken symlinks
        run: |
          .github/check-for-broken-symlinks.sh

      - name: Install commitlint and conventional-changelog
        run: yarn install

      - name: Check PR title
        if: always()
        # https://docs.github.com/en/actions/reference/security/secure-use#good-practices-for-mitigating-script-injection-attacks
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | yarn commitlint --verbose; then
            echo "::error title=Malformed PR::PR title must follow conventional commit conventions: https://www.conventionalcommits.org/en/v1.0.0/"
            exit 1
          fi

      - name: Check commit messages
        if: always()
        shell: bash
        run: |
          has_valid=false
          commits="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

          for commit in $(git rev-list "$commits"); do
            if git log -1 --format=%B "$commit" | yarn commitlint --verbose; then
              has_valid=true
              break
            fi
          done

          if [ "$has_valid" = true ]; then
            echo "Found valid commit"
            exit 0
          else
            echo "::error title=No valid commit found::At least one commit message in the PR must follow the conventionnal commits style: https://www.conventionalcommits.org/en/v1.0.0/"
            exit 1
          fi

      - name: Check Changelog
        if: always()
        run: |
          yarn conventional-changelog -p conventionalcommits -r 1 -u -o /var/tmp/changelog.md

          echo "===== DEBUG ====="
          cat /var/tmp/changelog.md
          echo "===== END ====="

  rebase-check:
    runs-on: ubuntu-24.04
    # revert when we have a clean testnet branch, see CSUB-1901
    if: false
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          lfs: true
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get install colordiff
          echo "BRANCH_NAME=rebase-dev+pr-${{ github.event.pull_request.number }}-onto-testnet" >> "$GITHUB_ENV"

      - name: Rebase current PR against `testnet` branch
        run: |
          git config --global user.email "creditcoin@gluwa.com"
          git config --global user.name "gluwa-bot"

          git checkout -b "${{ env.BRANCH_NAME }}"
          git branch
          git rebase "origin/testnet"

      - name: TODO
        if: always()
        run: |
          # note: GitHub appears to display these in reverse order
          echo "::notice::May also require reverting gluwa-bot commits on the default branch too!"
          echo "::notice::IMPORTANT:  Do this ASAP to prevent further branch divergence in the future."
          echo "::notice::SUGGESTION: Revert conflicting commit(s) on 'testnet' branch and/or merge default into 'testnet'."

      - name: DEBUG
        if: always()
        run: |
          cat .git/rebase-merge/git-rebase-todo.backup || echo
          git status
          git branch
          git diff --diff-filter=U | colordiff

          echo "Most Recent Common Ancestor"
          git merge-base "${{ env.BRANCH_NAME }}" origin/testnet --all

  merge-check:
    runs-on: ubuntu-24.04
    # revert when we have a clean testnet branch, see CSUB-1901
    if: false
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          lfs: true
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get install colordiff

      - name: Merge current PR into `testnet` branch
        env:
          BRANCH_NAME: merge+pr-${{ github.event.pull_request.number }}-into-testnet
        run: |
          git config --global user.email "creditcoin@gluwa.com"
          git config --global user.name "gluwa-bot"

          # make a branch first b/c we need it
          git checkout -b "${{ env.BRANCH_NAME }}"
          git branch

          # then switch to testnet branch and merge the incoming changes
          git checkout -b testnet "origin/testnet"
          git merge "${{ env.BRANCH_NAME }}"

      - name: TODO
        if: always()
        run: |
          # note: GitHub appears to display these in reverse order
          echo "::notice::May also require reverting gluwa-bot commits on the default branch too!"
          echo "::notice::IMPORTANT:  Do this ASAP to prevent further branch divergence in the future."
          echo "::notice::SUGGESTION: Revert conflicting commit(s) on 'testnet' branch and/or merge default into 'testnet'."

      - name: DEBUG
        if: always()
        run: |
          echo "INFO: Number of conflicts found"
          grep "<<< HEAD" ./* -R | wc -l

          echo "INFO: git status"
          git status
          git branch
          git diff --diff-filter=U | colordiff
