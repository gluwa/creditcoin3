[package]
name = "utils"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true

[dependencies]
starknet-crypto = { version = "0.6.1", default-features = false }
ethereum-types = { version = "0.14.1", default-features = false, features = ["serialize"] }
serde = { version = "1.0.193", features = ["derive", "alloc"], default-features = false }
serde_json = { version = "1.0.108", features = ["alloc"], default-features = false }
anyhow = { version = "1.0.68", default-features = false }
hex = { version = "0.4.3", features = ["alloc"], default-features = false }
rlp = { version = "0.5.2", features = ["rlp-derive"], default-features = false }
ethereum = { version = "0.15.0", default-features = false }
mmr = { path = "../mmr", default-features = false }
fs2 = { version = "0.4.3", optional = true, default-features = false }
acid_io = { version = "0.1.0", git = "https://github.com/dataphract/acid_io", default-features = false }

starknet-ff = { version = "0.3.7", default-features = false }
chrono = { version = "0.4.38", default-features = false }
colored = { version = "2.1.0", default-features = false}
sp-std = { workspace = true, default-features = false }

[features]
default = ["std"]
std = [
    "starknet-crypto/std",
    "ethereum-types/std",
    "serde/std",
    "serde_json/std",
    "anyhow/std",
    "hex/std",
    "rlp/std",
    "ethereum/std",
    "acid_io/std",
    "starknet-ff/std",
    "sp-std/std",
    "starknet-ff/std",
    "mmr/std",
    "fs2"
]
