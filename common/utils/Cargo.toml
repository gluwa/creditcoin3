[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "utils"
publish.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
acid_io = { version = "0.1.0", git = "https://github.com/dataphract/acid_io", default-features = false }
anyhow = { workspace = true, default-features = false }
chrono = { version = "0.4.38", default-features = false }
colored = { version = "2.1.0", default-features = false }
ethereum = { workspace = true, default-features = false }
ethereum-types = { workspace = true, default-features = false, features = [
    "serialize",
] }
fs2 = { version = "0.4.3", optional = true, default-features = false }
hex = { workspace = true, features = ["alloc"], default-features = false }
rlp = { version = "0.5.2", features = ["rlp-derive"], default-features = false }
sha3 = { version = "0.10", default-features = false }

# Workspace dependencies
parity-scale-codec = { workspace = true, default-features = false }
scale-info = { workspace = true, default-features = false }
serde = { workspace = true, features = [
    "derive",
    "alloc",
], default-features = false }
serde_json = { workspace = true, features = [
    "alloc",
], default-features = false }
sp-core = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }

[dev-dependencies]
tempfile = "3.8"

[features]
default = ["std"]
std = [
    "ethereum-types/std",
    "serde/std",
    "serde_json/std",
    "anyhow/std",
    "hex/std",
    "rlp/std",
    "ethereum/std",
    "acid_io/std",
    "sp-std/std",
    "fs2",
    "chrono/std",
    "parity-scale-codec/std",
    "scale-info/std",
    "sha3/std",
    "sp-core/std",
]
