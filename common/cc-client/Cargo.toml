[package]
name = "cc-client"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true

[lints.clippy]
pedantic = "warn"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
no_effect_underscore_binding = "allow"
redundant_slicing = "allow"
too_many_arguments = "allow"
module_name_repetitions = "allow"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing = "0.1"
jsonrpsee-http-client = "0.22"
jsonrpsee = "0.22"
jsonrpsee-core = "0.22"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
anyhow = "1.0"
hex = { version = "0.4", default-features = false, features = ["alloc"] }
tokio = "1.37.0"
alloy = { git = "https://github.com/alloy-rs/alloy", features = [
    "node-bindings",
    "providers",
    "provider-http",
    "provider-ws",
    "rpc-client",
    "rpc-types",
    "rpc-types-eth",
    "serde",
    "consensus",
    "rlp",
    "contract",
    "sol-types",
    "signers",
] }

# Substrate 
subxt = "0.37"
subxt-signer = "0.37"
sp-core = { workspace = true, default-features = false }

# Creditcoin deps
creditcoin3-attestor-gossip = { workspace = true }
attestor-primitives = { workspace = true }
bls-signatures = { workspace = true }

[features]
default = ["std"]
std = ["sp-core/std", "attestor-primitives/std", "bls-signatures/std"]
