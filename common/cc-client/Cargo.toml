[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "cc-client"
publish.workspace = true
repository.workspace = true
version.workspace = true

[lints.clippy]
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
no_effect_underscore_binding = "allow"
pedantic = "warn"
redundant_slicing = "allow"
too_many_arguments = "allow"

[dependencies]
anyhow = "1.0"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Substrate
subxt = { version = "0.40", features = ["reconnecting-rpc-client"] }
subxt-signer = "0.40"

# Creditcoin deps
attestor-primitives = { workspace = true, features = ["std"] }
bls-signatures = { workspace = true }
creditcoin3-attestor-gossip = { workspace = true }
prover-primitives = { workspace = true, features = ["std"] }
vrf = { workspace = true }

# workspace deps
hex = { workspace = true }
parity-scale-codec = { workspace = true }
serde = { workspace = true }
sp-core = { workspace = true, default-features = false }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[features]
default = ["std"]
std = ["sp-core/std", "attestor-primitives/std", "bls-signatures/std"]
