[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "cc-client"
publish.workspace = true
repository.workspace = true
version.workspace = true

[lints.clippy]
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
no_effect_underscore_binding = "allow"
pedantic = "warn"
redundant_slicing = "allow"
too_many_arguments = "allow"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Ethereum
alloy = { git = "https://github.com/alloy-rs/alloy", features = [
    "node-bindings",
    "providers",
    "provider-http",
    "provider-ws",
    "rpc-client",
    "rpc-types",
    "rpc-types-eth",
    "serde",
    "consensus",
    "rlp",
    "contract",
    "sol-types",
    "signers",
] }

# Substrate
subxt = "0.37"
subxt-signer = "0.37"

# Creditcoin deps
attestor-primitives = { workspace = true }
bls-signatures = { workspace = true }
creditcoin3-attestor-gossip = { workspace = true }
prover-primitives = { workspace = true }

# workspace deps
hex = { workspace = true }
serde = { workspace = true }
sp-core = { workspace = true, default-features = false }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[features]
default = ["std"]
std = ["sp-core/std", "attestor-primitives/std", "bls-signatures/std"]
