[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "cc-client"
publish.workspace = true
repository.workspace = true
version.workspace = true

[lints.clippy]
large_enum_variant = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
no_effect_underscore_binding = "allow"
pedantic = "warn"
redundant_slicing = "allow"
too_many_arguments = "allow"

[dependencies]
anyhow = "1.0"

# Substrate
subxt = { version = "0.40", features = ["reconnecting-rpc-client"] }
subxt-signer = "0.40"

# Creditcoin deps
attestor-primitives = { workspace = true, features = ["std"] }
creditcoin3-attestor-gossip = { workspace = true }
supported-chains-primitives = { workspace = true }
vrf = { workspace = true }

# workspace deps
ccnext-abi-encoding = { workspace = true, optional = true }
sc-service = { workspace = true }
serde = { workspace = true }
sp-core = { workspace = true, default-features = false }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[features]
default = ["std"]
std = ["sp-core/std", "attestor-primitives/std", "ccnext-abi-encoding"]
