[package]
name = "continuity"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false
description = "Continuity proof generation library for Creditcoin3"
keywords = ["creditcoin", "oracle", "proof", "attestation"]
categories = ["cryptography"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }

# Creditcoin / USC dependencies
attestor-primitives = { workspace = true }
cc-client = { workspace = true }
ccnext-abi-encoding = { workspace = true }
eth = { workspace = true }
indexer-client = { workspace = true }
sp-core = { workspace = true }
utils = { workspace = true }

[features]
block_cache = ["eth/block_cache"]
default = []
