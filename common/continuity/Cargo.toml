[package]
categories = ["cryptography"]
description = "Continuity proof generation library for Creditcoin3"
edition = "2021"
keywords = ["creditcoin", "oracle", "proof", "attestation"]
license = "MIT"
name = "continuity"
publish = false
version = "0.1.0"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }

# Creditcoin / USC dependencies
attestor-primitives = { workspace = true }
cc-client = { workspace = true }
eth = { workspace = true }
indexer-client = { workspace = true }
sp-core = { workspace = true }
usc-abi-encoding = { workspace = true }
utils = { workspace = true }

[features]
block_cache = ["eth/block_cache"]
default = []
