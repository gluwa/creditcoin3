[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "eth"
publish.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
alloy = { workspace = true, features = ["full"] }

anyhow = { workspace = true }
async-trait = { workspace = true }
futures = "0.3.30"
futures-util = { workspace = true }
hex = { workspace = true }
# Pulled in to enable response compression on alloy's HTTP transport: alloy uses
# this same `reqwest` internally and Cargo unifies features, so enabling gzip +
# brotli here turns it on for every block fetch. Receipt-heavy JSON compresses
# ~5-10x, which is decisive when archival is download-bandwidth bound.
reqwest = { workspace = true, features = ["gzip", "brotli"] }
redis = { workspace = true, features = [
    "cluster",
    "cluster-async",
    "connection-manager",
    "tokio-comp",
], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
snap = { workspace = true, optional = true }
sp-core = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
usc-abi-encoding = { workspace = true }

# Local dependencies
attestor-primitives = { workspace = true }
merkle = { workspace = true }
prometheus-client = { workspace = true, optional = true }
user = { workspace = true }
utils = { workspace = true }

[features]
block_cache = ["redis", "serde", "serde_json", "snap", "prometheus-client"]
default = []
