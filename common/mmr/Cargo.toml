[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "mmr"
publish.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
fp-evm = { workspace = true, default-features = false, optional = true }
log = { workspace = true, default-features = false, optional = true }
precompile-utils = { workspace = true, default-features = false, optional = true }
rayon = { version = "1.10.0", optional = true }
sp-core = { workspace = true, default-features = false }
sp-io = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
twox-hash = { version = "2.1", default-features = false }

[features]
default = ["std"]
par_mmr = ["rayon"]
std = [
    "par_mmr",
    "twox-hash/std",
    "sp-core/std",
    "sp-io/std",
    "sp-std/std",
    "fp-evm?/std",
    "precompile-utils?/std",
    "log?/std",
]
verification = ["fp-evm", "precompile-utils", "log"]
