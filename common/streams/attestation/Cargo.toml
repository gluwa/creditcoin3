[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "stream_attestation"
publish.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
# Ethereum
eth = { workspace = true, default-features = true }

# Creditcoin
attestor-primitives = { workspace = true, default-features = true }
bls-signatures = { workspace = true }
cc-client = { workspace = true }
ccnext-abi-encoding = { workspace = true }

# Streams
async-stream = { workspace = true }
futures = { workspace = true }
stream_eth = { workspace = true }

# Async & Parallelism
tokio = { workspace = true, features = ["full"] }

# Parsing 
clap = { workspace = true, features = ["cargo"] }
url = { workspace = true, features = ["serde"] }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["json"] }

# Util
bip39 = { version = "2.2.0", features = ["rand", "serde"] }
builder = { workspace = true }
sp-core = { workspace = true }
user = { workspace = true }
