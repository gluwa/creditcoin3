[package]
edition = "2021"
license = "MIT"
name = "usc_audit_automation"
version = "0.1.0"

[[bin]]
name = "usc_audit_automation"
path = "bin/sanities_checker.rs"

[lib]
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
dotenv = "0.15"
ethers = "2"
ethers-contract = "2"
ethers-core = "2"
ethers-providers = "2"
mockall = "0.11"
num-format = "0.4"
subxt = { version = "0.40", features = ["reconnecting-rpc-client"] }
tokio = { version = "1.47", features = ["macros", "rt-multi-thread", "time"] }
toml = "0.9"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Creditcoin deps
attestor-primitives = { workspace = true }
cc-client = { workspace = true }

# Workspace deps
async-trait = { workspace = true }
clap = { workspace = true }
futures = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sp-core = { workspace = true }
tracing = { workspace = true }
