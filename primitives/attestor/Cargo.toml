[package]
name = "attestor-primitives"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
sp-core = { workspace = true }
sp-std = { workspace = true }
parity-scale-codec = { workspace = true }
frame-support = { workspace = true }
sp-runtime = { workspace = true }
sp-io = { workspace = true }
serde = { workspace = true }
scale-info = { workspace = true }
bls-signatures = { workspace = true, optional = true }
sp-api = { workspace = true, default-features = false }
serde_bytes = { version = "0.11.14", default-features = false }

ark-ff = { version = "0.4.0-alpha", default-features = false }
ark-ec = { version = "0.4.0-alpha", default-features = false }
ark-serialize = { version = "0.4.0-alpha", default-features = false, features = ["derive"] }
ark-bls12-377 = { version = "0.4.0-alpha.2", default-features = false, features = ["curve"] }
rand = { version = "0.8", default-features = false }

# just in case for now
w3f-bls = { workspace = true }

[dev-dependencies]
ark-std = { version = "0.4.0-alpha", default-features = false }

[features]
default = ["std", "bls"]
bls = [ "bls-signatures" ]
std = [
    "parity-scale-codec/std",
    "frame-support/std",
    "sp-core/std",
    "sp-std/std",
    "sp-runtime/std",
    "sp-io/std",
    "serde/std",
    "serde_bytes/std",
    "scale-info/std",
    "sp-api/std",
    "rand/std",
]
