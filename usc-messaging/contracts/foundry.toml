[profile.default]
fs_permissions = [
    { access = "read-write", path = "./" },
    { access = "read-write", path = "../" },
]
libs = ["lib"]
out = "out"
solc = "0.8.24"
src = "src"
remappings = ["@gluwa/usc-contracts/=node_modules/@gluwa/usc-contracts/contracts/"]

[profile.default.fmt]
line_length = 100
