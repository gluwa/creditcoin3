type ChainQueries @entity {
    """
    Represents a ChainQuery with chainKey, height, index, and layout segments
    """
    id: ID!
    chainQueryId: String! @index
    chainKey: Int!
    height: BigInt!
    index: BigInt!
    layoutSegments: [LayoutSegment]
    state: QueryStatus!

    estimatedCost: BigInt!
    escrowedAmount: BigInt!
}

enum QueryStatus {
    Uninitialized,
    Submitted,
    ResultAvailable,
    TimedOut,
    InvalidQuery
}

type LayoutSegment @jsonField {
    offset: String!
    size: String!
}

type Proof @entity {
    """
    Represents a proof with id, queryRef, and result segments
    """
    id: ID!
    queryRef: String!
    resultSegments: [ResultSegment]
}

type ResultSegment @jsonField {
    offset: String!
    bytes: String!
}

