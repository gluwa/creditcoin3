type AttestationChainData @entity {
    id: ID!
    # The chain key of the attestation chain
    chainKey: BigInt! @index
    # Chain reward
    chainReward: BigInt! @deprecated(reason: "Attestor rewards have been phased out")
    # Minimum bond requirement
    minBondRequirement: BigInt!
    # Attestation interval
    attestationInterval: BigInt!
    # Checkpoint interval
    checkpointInterval: Int! # this-is-expected
    # Target sample size
    targetSampleSize: Int! # this-is-expected
    # Max set size
    maxSetSize: Int! # this-is-expected
    # Last checkpoint header number
    lastCheckpointHeaderNumber: BigInt!
    # Last attested header number
    lastAttestedHeaderNumber: BigInt!
    # Last attested digest
    lastAttestedDigest: String!
    # Current attestor election policy
    electionPolicy: String!
}

type Transfer @entity {
    """
    id field is always required and must look like this
    """
    id: ID!
    """
    Amount that is transferred
    """
    amount: BigInt!
    """
    The block height of the transfer
    """
    blockNumber: BigInt!
    """
    The date of the transfer
    """
    date: Date
    """
    The account that transfers are made from
    """
    from: Account!
    """
    The account that transfers are made to
    """
    to: Account!
}

type Account @entity {
    """
    id field is always required and must look like this
    """
    id: ID!
    """
    The public key of this account (same across all Polkadot parachains)
    """
    publicKey: String!
    """
    The first block on which we see a transfer involving this account
    """
    firstTransferBlock: Int
    """
    The most recent block on which we see a transfer involving this account
    """
    lastTransferBlock: Int
    sentTransfers: [Transfer] @derivedFrom(field: "from") # These are virtual properties to help us navigate to the correct foreign key of Transfer
    recievedTransfers: [Transfer] @derivedFrom(field: "to") # These are virtual properties to help us navigate to the correct foreign key of Transfer
}

type MapAttestationAttestor @entity {
    id: ID!
    attestation: Attestations!
    attestor: Attestors!
}

type Attestations @entity {
    """
    id field is always required and must look like this
    """
    id: ID!

    chainKey: BigInt! @index

    headerNumber: BigInt!

    headerHash: String!

    root: String!

    prevDigest: String

    signature: String!

    digest: String!

    timestamp: BigInt!

    continuityProof: ContinuityProof
}

type ContinuityProof @jsonField {
    blocks: [ContinuityBlock] # List of continuity blocks
}

type ContinuityBlock @jsonField {
    blockNumber: BigInt! # Block number of the continuity block
    merkleRoot: String! # Root hash of the continuity block
    prevDigest: String # Previous digest of the continuity block
    digest: String! # Digest of the continuity block
}

type Attestors @entity {
    """
    id field is always required and must look like this
    """
    id: ID!

    chainKey: BigInt! @index

    attestor: Account! @index

    stash: Account! @index

    lastUpdateBlockNumber: BigInt!
    """
    1 - Registred, 2 Unregistered, 3 - Elected, 4 - Activated, 5 - Chilled
    """
    status: Int! # this-is-expected
    blsPublicKey: String!
}

