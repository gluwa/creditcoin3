type TransactionVerified @entity {
    """
    Transaction verification event from the Native Query Verifier precompile.
    Emitted when a transaction is successfully verified via the TransactionVerified event.
    """
    id: ID!

    # Chain key from the verified transaction
    chainId: BigInt! @index

    # Block height for the verified transaction
    height: BigInt! @index

    # Transaction index within the block (from Merkle proof)
    transactionIndex: BigInt!

    # Creditcoin3 block number when verification occurred
    ccBlockNumber: BigInt!

    # Timestamp of verification
    timestamp: BigInt!

    # Transaction hash at which the event occurred
    txHash: String! @index
}

