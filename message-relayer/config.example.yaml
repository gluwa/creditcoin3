# Sample multi-route configuration for the message-relayer PoC.
#
# Copy to relayer.yaml, edit the values, and run:
#
#   cargo run -p message-relayer -- --config message-relayer/relayer.yaml \
#     --cc3-rpc-url ws://localhost:9944
#
# The Creditcoin RPC URLs are intentionally NOT in this file — they are supplied via
# `--cc3-rpc-url` / `RELAYER_CC3_RPC_URL` (Substrate WS) and `--creditcoin-eth-rpc-url` /
# `RELAYER_CC3_ETH_RPC_URL` (EVM HTTP/WS for Outbox events) so the same YAML can be reused
# across environments.

bind_host: "0.0.0.0"
bind_port: 3200

p2p:
  port: 9100
  # Public DNS / address advertised to peers (omit for OS-assigned ipv4).
  # public_addr: relayer-eu-1.example.com
  boot_nodes:
    # - "/dns4/attester-1.example.com/tcp/9000/p2p/12D3KooWXX...XX"
  # Set true to disable mDNS local discovery (recommended on Kubernetes).
  no_mdns: false
  # BIP39 mnemonic or 0x-prefixed 32-byte hex seed for the libp2p identity.
  # If omitted, an ephemeral identity is generated each run.
  # identity: "0x...64 hex chars..."

vote_cache:
  ttl_seconds: 1800
  max_messages: 10000

delivery:
  simulate_before_send: true
  max_retries: 5
  gas_multiplier: 1.2

# One entry per (creditcoin_chain_key -> destination chain) route.
routes:
  - chain_key: 2
    # eth_chainId of the Creditcoin L1 (bound for messageHash; see PoC §5.2).
    creditcoin_chain_id: 102031
    # Outbox address override; omit to use factory resolution (PoC stub).
    outbox_address: "0x0000000000000000000000000000000000000001"
    destination_rpc_url: "http://localhost:8545"
    inbox_address: "0x0000000000000000000000000000000000000002"
    # Hex private key for the destination signer; required to actually deliver,
    # may be omitted while the relayer runs read-only for testing.
    # signer_key: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    block_confirmation_depth: 12
    attester_set:
      kind: static
      addresses:
        - "0x000000000000000000000000000000000000000a"
        - "0x000000000000000000000000000000000000000b"
        - "0x000000000000000000000000000000000000000c"
    # Override the 2N/3+1 quorum (only set this in development).
    # threshold_override: 2

  # Second route example: same Creditcoin chain_key cannot repeat, but the
  # binary handles many destination chains in parallel.
  # - chain_key: 7
  #   creditcoin_chain_id: 102031
  #   destination_rpc_url: "https://polygon-rpc.com"
  #   inbox_address: "0x..."
  #   block_confirmation_depth: 64
  #   attester_set:
  #     kind: cc3_active_set
  #     chain_key: 7
