[package]
name = "pallet-prover"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true

[lints.clippy]
missing_errors_doc = "allow"
missing_panics_doc = "allow"
no_effect_underscore_binding = "allow"
type_complexity = "allow"

[dependencies]
log = { workspace = true, default-features = false }
hex = { workspace = true }
serde = { workspace = true, default-features = false }

frame-support = { workspace = true, default-features = false }
frame-system = { workspace = true, default-features = false }
parity-scale-codec = { workspace = true, default-features = false }
scale-info = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
sp-core = { workspace = true, default-features = false }
sp-io = { workspace = true, default-features = false }

pallet-balances = { workspace = true, default-features = false }
frame-benchmarking = { workspace = true, default-features = false, optional = true }

attestor-primitives = { workspace = true, default-features = false }
prover-primitives = { workspace = true, default-features = false }
supported-chains-primitives = { workspace = true, default-features = false }

proof-verifier = { workspace = true, default-features = false }

fp-account = { workspace = true, default-features = false }

[dev-dependencies]
assert_matches = { workspace = true }
pallet-balances = { workspace = true }
pallet-supported-chains = { workspace = true }
env_logger = { workspace = true }

[features]
default = ["std"]
std = [
    "frame-support/std",
    "frame-system/std",
    "log/std",
    "hex/std",
    "serde/std",
    "sp-runtime/std",
    "sp-std/std",
    "sp-core/std",
    "sp-io/std",
    "pallet-balances/std",
    "pallet-supported-chains/std",
    "parity-scale-codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "attestor-primitives/std",
    "prover-primitives/std",
    "fp-account/std",
    "supported-chains-primitives/std",
    "proof-verifier/std",
    "prover-primitives/std",
]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "sp-runtime/runtime-benchmarks",
]
