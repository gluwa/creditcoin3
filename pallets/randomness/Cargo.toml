[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "pallet-randomness"
publish.workspace = true
repository.workspace = true
version.workspace = true

[package.metadata.cargo-machete]
ignored = ["scale-info"]

[dependencies]
parity-scale-codec = { workspace = true, default-features = false, features = [
    "derive",
] }
scale-info = { workspace = true, default-features = false, features = [
    "derive",
    "serde",
] }

frame-benchmarking = { workspace = true, optional = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
log = { workspace = true }
pallet-authorship = { workspace = true }
pallet-babe = { workspace = true }
pallet-session = { workspace = true }
randomness-primitives = { workspace = true, default-features = false }
sp-consensus-babe = { workspace = true, default-features = false, features = [
    "serde",
] }
sp-runtime = { workspace = true, default-features = false, features = [
    "serde",
] }
sp-std = { workspace = true }

[dev-dependencies]
frame-election-provider-support = { workspace = true }
pallet-balances = { workspace = true }
pallet-offences = { workspace = true }
pallet-staking = { workspace = true }
pallet-staking-reward-curve = { workspace = true, default-features = false }
pallet-timestamp = { workspace = true }
sp-core = { workspace = true, default-features = false, features = ["serde"] }
sp-io = { workspace = true }
sp-staking = { workspace = true, default-features = false, features = [
    "serde",
] }

[features]
default = ["std"]
std = [
    "parity-scale-codec/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "log/std",
    "scale-info/std",
    "sp-std/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "randomness-primitives/std",
    "pallet-babe/std",
    "pallet-authorship/std",
    "pallet-session/std",
    "pallet-staking/std",
    "sp-staking/std",
    "pallet-balances/std",
    "sp-consensus-babe/std",
]

runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "sp-runtime/runtime-benchmarks",
    "pallet-babe/runtime-benchmarks",
    "pallet-session/runtime-benchmarks",
]

try-runtime = [
    "frame-support/try-runtime",
    "frame-system/try-runtime",
    "sp-runtime/try-runtime",
    "pallet-babe/try-runtime",
]
