[package]
name = "pallet-randomness"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true


[dependencies]
parity-scale-codec = { workspace = true, default-features = false, features = ["derive"] }
scale-info = { workspace = true, default-features = false, features = ["derive", "serde"] }

frame-benchmarking = { workspace = true, optional = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
attestor-primitives = { workspace = true }
supported-chains-primitives = { workspace = true }
randomness-primitives = { workspace = true }
sp-std = { workspace = true }
sp-runtime = { workspace = true, default-features = false, features = ["serde"] }
pallet-babe = { workspace = true }
pallet-authorship = { workspace = true }
pallet-session = { workspace = true }
sp-application-crypto = { workspace = true, default-features = false, features = ["serde"] }
sp-consensus-babe = { workspace = true, default-features = false, features = ["serde"] }
sp-session = { workspace = true }


[dev-dependencies]
sp-core = { workspace = true, default-features = false, features = ["serde"] }
sp-io = { workspace = true }
sp-session = { workspace = true }
pallet-timestamp = { workspace = true }
pallet-balances = { workspace = true }
pallet-offences = { workspace = true }
sp-staking = { workspace = true, default-features = false, features = ["serde"] }
pallet-staking = { workspace = true }
frame-election-provider-support = { workspace = true }
pallet-staking-reward-curve = { version = "4.0.0-dev", git = "https://github.com/gluwa/polkadot-sdk", branch = "release-polkadot-v1.1.0-patch", default-features = false }

[features]
default = ["std"]
std = [
    "parity-scale-codec/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "scale-info/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "attestor-primitives/std",
    "supported-chains-primitives/std",
    "randomness-primitives/std",
    "sp-std/std",
    "pallet-babe/std",
    "pallet-authorship/std",
    "pallet-session/std",
    "sp-session/std",
    "pallet-staking/std",
    "sp-staking/std",
    "pallet-balances/std",
]

runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "sp-runtime/runtime-benchmarks",
]