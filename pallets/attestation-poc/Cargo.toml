[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "pallet-attestation-poc"
publish.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
log = { workspace = true }

frame-support = { workspace = true }
frame-system = { workspace = true }
parity-scale-codec = { workspace = true }
scale-info = { workspace = true }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-staking = { workspace = true }
sp-std = { workspace = true }

frame-benchmarking = { workspace = true, optional = true }
pallet-balances = { workspace = true }

attestor-primitives = { workspace = true }
bls-signatures = { workspace = true, default-features = false }
randomness-primitives = { workspace = true }
serde = { workspace = true, default-features = false, features = ["derive"] }
starknet-crypto = { workspace = true, default-features = false }
supported-chains-primitives = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
env_logger = { workspace = true }
extend = "1.2.0"
frame-election-provider-support = { workspace = true }
pallet-authorship = { workspace = true }
pallet-babe = { workspace = true }
pallet-offences = { workspace = true }
pallet-randomness = { workspace = true }
pallet-session = { workspace = true }
pallet-staking = { workspace = true, default-features = false }
pallet-staking-reward-curve = { workspace = true, default-features = false }
pallet-supported-chains = { workspace = true }
pallet-timestamp = { workspace = true }
sp-consensus-babe = { workspace = true, default-features = false, features = [
    "serde",
] }

[features]
default = ["std"]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "pallet-balances/runtime-benchmarks",
    "sp-runtime/runtime-benchmarks",
    "sp-staking/runtime-benchmarks",
]
std = [
    "frame-support/std",
    "frame-system/std",
    "log/std",
    "sp-runtime/std",
    "sp-std/std",
    "sp-core/std",
    "sp-io/std",
    "pallet-balances/std",
    "parity-scale-codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "attestor-primitives/std",
    "pallet-supported-chains/std",
    "supported-chains-primitives/std",
    "bls-signatures/std",
    "serde/std",
    "starknet-crypto/std",
    "sp-staking/std",
    "frame-election-provider-support/std",
    "pallet-authorship/std",
    "pallet-babe/std",
    "pallet-offences/std",
    "pallet-session/std",
    "pallet-staking/std",
    "pallet-timestamp/std",
    "sp-consensus-babe/std",
    "randomness-primitives/std",
    "pallet-randomness/std",
]
